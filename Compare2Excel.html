<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>學習扶助名單整合工具</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #f0ede8;
    --surface: #ffffff;
    --surface2: #faf8f5;
    --border: #d8d2c8;
    --accent: #2c5f4a;
    --accent2: #e8a020;
    --danger: #c0392b;
    --warn: #e67e22;
    --text: #1a1a1a;
    --text-soft: #666;
    --text-muted: #999;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px 60px;
  }

  header {
    max-width: 960px;
    margin: 0 auto 32px;
    border-bottom: 2px solid var(--accent);
    padding-bottom: 16px;
  }
  header h1 { font-size: 1.6rem; font-weight: 700; color: var(--accent); letter-spacing: 0.02em; }
  header p { font-size: 0.875rem; color: var(--text-soft); margin-top: 4px; }

  .main { max-width: 960px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden;
  }
  .card-header {
    background: var(--accent); color: #fff; padding: 12px 20px;
    font-weight: 500; font-size: 0.95rem; display: flex; align-items: center; gap: 8px;
  }
  .card-header .badge {
    background: rgba(255,255,255,0.2); border-radius: 20px;
    padding: 1px 10px; font-size: 0.78rem; font-family: 'DM Mono', monospace;
  }
  .card-body { padding: 20px; }

  .upload-zone {
    border: 2px dashed var(--border); border-radius: 8px; padding: 28px 20px;
    text-align: center; cursor: pointer; transition: all 0.2s;
    background: var(--surface2); position: relative;
  }
  .upload-zone:hover, .upload-zone.dragover { border-color: var(--accent); background: #f0f7f4; }
  .upload-zone input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .upload-zone .icon { font-size: 2rem; margin-bottom: 8px; }
  .upload-zone .label { font-size: 0.9rem; color: var(--text-soft); }
  .upload-zone .sublabel { font-size: 0.78rem; color: var(--text-muted); margin-top: 4px; }

  .file-info {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    background: #f0f7f4; border-radius: 6px; padding: 10px 14px;
    margin-top: 12px; font-size: 0.85rem;
  }
  .file-info .fname { font-weight: 500; color: var(--accent); font-family: 'DM Mono', monospace; }
  .file-info .fcount { color: var(--text-soft); }

  .alert {
    border-radius: 8px; padding: 12px 16px; font-size: 0.875rem; margin-bottom: 12px;
    display: flex; gap: 10px; align-items: flex-start;
  }
  .alert-warn   { background: #fff8ee; border: 1px solid #f5c97a; color: #7a4f00; }
  .alert-danger { background: #fdf2f0; border: 1px solid #e8a99a; color: #8b1c0f; }
  .alert-success{ background: #f0f7f4; border: 1px solid #7fbfa6; color: #1a4d38; }
  .alert-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }

  .dup-list { list-style: none; margin-top: 8px; display: flex; flex-wrap: wrap; gap: 6px; }
  .dup-list li {
    background: #fff; border: 1px solid #e8a99a; color: #c0392b;
    border-radius: 20px; padding: 2px 12px; font-size: 0.82rem; font-weight: 500;
  }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 10px 22px; border-radius: 8px; border: none; cursor: pointer;
    font-size: 0.9rem; font-family: 'Noto Sans TC', sans-serif; font-weight: 500; transition: all 0.2s;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #234d3c; }
  .btn-primary:disabled { background: #aaa; cursor: not-allowed; }
  .btn-export { background: var(--accent2); color: #fff; }
  .btn-export:hover { background: #c47c10; }
  .btn-export:disabled { background: #aaa; cursor: not-allowed; }
  .actions { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px; }

  .table-wrap {
    overflow-x: auto; margin-top: 16px; border-radius: 8px;
    border: 1px solid var(--border); max-height: 480px;
  }
  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  thead th {
    background: var(--accent); color: #fff; padding: 10px 12px;
    text-align: left; font-weight: 500; white-space: nowrap;
    position: sticky; top: 0; z-index: 1;
  }
  tbody tr:nth-child(even) { background: var(--surface2); }
  tbody td { padding: 8px 12px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  tbody tr:last-child td { border-bottom: none; }
  .table-empty { padding: 32px; text-align: center; color: var(--text-muted); font-size: 0.88rem; }

  .tag { display: inline-block; padding: 1px 8px; border-radius: 20px; font-size: 0.75rem; font-weight: 500; }
  .tag-ok   { background: #e0f0e9; color: var(--accent); }
  .tag-miss { background: #fdecea; color: var(--danger); }

  .stat-row { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
  .stat {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 18px; flex: 1; min-width: 140px;
  }
  .stat-num { font-size: 1.6rem; font-weight: 700; color: var(--accent); font-family: 'DM Mono', monospace; }
  .stat-label { font-size: 0.78rem; color: var(--text-soft); margin-top: 2px; }

  .step-num {
    display: inline-flex; align-items: center; justify-content: center;
    width: 22px; height: 22px; border-radius: 50%;
    background: rgba(255,255,255,0.25); font-size: 0.78rem; font-weight: 700; flex-shrink: 0;
  }

  #manual-dup-section { margin-top: 16px; }
  .dup-manual-item {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px 16px; margin-bottom: 10px;
  }
  .dup-manual-item h4 { font-size: 0.9rem; color: var(--danger); margin-bottom: 10px; }
  .dup-manual-table { width: 100%; font-size: 0.82rem; border-collapse: collapse; }
  .dup-manual-table td, .dup-manual-table th {
    padding: 6px 10px; border: 1px solid var(--border); text-align: left;
  }
  .dup-manual-table th { background: #f0f0f0; font-weight: 500; }
  .dup-radio { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }

  .hidden { display: none; }
</style>
</head>
<body>

<header>
  <h1>📋 學習扶助名單整合工具</h1>
  <p>上傳考試名單 + 全校學生資料，自動整合並輸出符合格式的 Excel 檔案</p>
</header>

<div class="main">

  <!-- Step 1 -->
  <div class="card">
    <div class="card-header">
      <span class="step-num">1</span>
      上傳「考試名單」Excel
      <span class="badge">需含：姓名欄位</span>
    </div>
    <div class="card-body">
      <div class="upload-zone" id="zone1">
        <input type="file" id="file1" accept=".xlsx,.xls">
        <div class="icon">📄</div>
        <div class="label">點擊或拖曳上傳考試名單</div>
        <div class="sublabel">支援 .xlsx / .xls</div>
      </div>
      <div id="file1-info" class="hidden"></div>
      <div id="dup-alert" class="hidden" style="margin-top:12px;"></div>
      <div id="manual-dup-section" class="hidden"></div>
    </div>
  </div>

  <!-- Step 2 -->
  <div class="card">
    <div class="card-header">
      <span class="step-num">2</span>
      上傳「全校學生名單」Excel
      <span class="badge">需含：班級、座號、身分證、姓名</span>
    </div>
    <div class="card-body">
      <div class="upload-zone" id="zone2">
        <input type="file" id="file2" accept=".xlsx,.xls">
        <div class="icon">🏫</div>
        <div class="label">點擊或拖曳上傳全校學生名單</div>
        <div class="sublabel">支援 .xlsx / .xls</div>
      </div>
      <div id="file2-info" class="hidden"></div>
    </div>
  </div>

  <!-- Step 3 -->
  <div class="card">
    <div class="card-header">
      <span class="step-num">3</span>
      整合 &amp; 預覽結果
    </div>
    <div class="card-body">
      <div class="actions">
        <button class="btn btn-primary" id="btn-merge" disabled>🔄 開始整合</button>
        <button class="btn btn-export" id="btn-export" disabled>⬇️ 匯出 Excel</button>
      </div>
      <div id="merge-alerts" style="margin-top:16px;"></div>
      <div id="stats-row" class="hidden stat-row" style="margin-top:4px;"></div>
      <div id="preview-wrap" class="hidden">
        <div class="table-wrap">
          <table id="preview-table">
            <thead></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
// ── 狀態 ───────────────────────────────────────────────────────────────
let examRows       = [];
let schoolRows     = [];
let examNames      = [];
let duplicateNames = [];
let mergedData     = [];
let examClsMap     = {};  // name → 班級(從考試名單)，用於雙重比對
let examRowMap     = {};  // name → 考試名單原始 row
let examEntryYearMap = {};  // name → 入學年度（從考試名單直接讀取）

// ── 全校名單欄位別名 ────────────────────────────────────────────────────
const SCHOOL_ALIAS = {
  name : ['姓名', '學生姓名', '名字'],
  cls  : ['班級', '目前班級'],
  seat : ['座號', '座位'],
  id   : ['身分證', '身分證字號', '身分證統一編號', '證號', '身份證'],
};

function findCol(headers, aliases) {
  for (const a of aliases) {
    const h = headers.find(h => h && String(h).includes(a));
    if (h !== undefined) return h;
  }
  return null;
}

// ── 入學年度：民國115年時 1年級=114, 2年級=113 → 民國年 - 年級
function calcEntryYear(clsStr) {
  const now = new Date().getFullYear() - 1911;
  const s = String(clsStr).trim();
  let grade;
  if      (s.length === 3) grade = parseInt(s[0]);
  else if (s.length === 4) grade = parseInt(s.substring(0, 2));
  else                     grade = parseInt(s);
  return (!grade || isNaN(grade)) ? '' : String(now - grade);
}

// 目前班級取最後一碼（班級號）：101→1, 203→3, 803→3, 1001→1
function extractGrade(clsStr) {
  const s = String(clsStr).trim();
  return s[s.length - 1] || s;
}

// ── 上傳區設定 ─────────────────────────────────────────────────────────
function setupZone(zoneId, inputId, cb) {
  const zone  = document.getElementById(zoneId);
  const input = document.getElementById(inputId);
  zone.addEventListener('dragover',  e => { e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('dragover');
    if (e.dataTransfer.files[0]) { input.files = e.dataTransfer.files; readFile(input, cb); }
  });
  input.addEventListener('change', () => readFile(input, cb));
}

function readFile(input, cb) {
  const f = input.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = e => {
    const wb   = XLSX.read(e.target.result, { type: 'array' });
    const ws   = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
    cb(f.name, rows);
  };
  reader.readAsArrayBuffer(f);
}

// ── 考試名單上傳 ───────────────────────────────────────────────────────
setupZone('zone1', 'file1', (fname, rows) => {
  examRows = rows;
  if (!rows.length) return;
  const headers = Object.keys(rows[0]);

  // 優先完全符合「姓名」，再找含「姓名」，再fallback到第2欄或第1欄
  const nameCol =
    headers.find(h => h.trim() === '姓名') ||
    headers.find(h => h.includes('姓名') || h.includes('名字')) ||
    headers[1] || headers[0];

  const allNames = rows.map(r => String(r[nameCol] || '').trim()).filter(Boolean);
  const countMap = {};
  allNames.forEach(n => countMap[n] = (countMap[n] || 0) + 1);
  duplicateNames = Object.entries(countMap).filter(([, c]) => c > 1).map(([n]) => n);
  examNames      = [...new Set(allNames.filter(n => !duplicateNames.includes(n)))];

  // 偵測考試名單的班級欄（用於後續雙重比對）
  const examClsCol =
    headers.find(h => h.trim() === '班級') ||
    headers.find(h => h.trim() === '目前年級') ||
    headers.find(h => h.includes('班級') || h.includes('年級'));
  examClsMap = {};
  examRowMap = {};
  examEntryYearMap = {};
  // 偵測入學年度欄（數字欄位值在 109~120 範圍）
  const examEntryCol = headers.find(h => {
    const sample = rows.slice(0,5).map(r => parseInt(r[h])).filter(v => v >= 109 && v <= 120);
    return sample.length > 0;
  });
  rows.forEach(r => {
    const n = String(r[nameCol] || '').trim();
    if (!examRowMap[n]) examRowMap[n] = r;
    if (examClsCol) {
      const c = String(r[examClsCol] || '').trim();
      if (n && c) examClsMap[n] = c;
    }
    if (examEntryCol) {
      const y = String(r[examEntryCol] || '').trim();
      if (n && y) examEntryYearMap[n] = y;
    }
  });

  // 顯示檔案資訊
  const info = document.getElementById('file1-info');
  info.className = 'file-info';
  info.innerHTML =
    `<span>📄</span>` +
    `<span class="fname">${fname}</span>` +
    `<span class="fcount">共 ${allNames.length} 筆、${Object.keys(countMap).length} 位學生</span>` +
    `<span style="color:var(--text-muted);font-size:0.77rem;">（偵測姓名欄：「${nameCol}」）</span>`;

  // 重複姓名警告
  const dupEl = document.getElementById('dup-alert');
  if (duplicateNames.length > 0) {
    dupEl.className = 'alert alert-danger';
    dupEl.innerHTML =
      `<span class="alert-icon">⚠️</span>` +
      `<div><strong>發現 ${duplicateNames.length} 個重複姓名，請手動選擇要加入的學生：</strong>` +
      `<ul class="dup-list">${duplicateNames.map(n => `<li>${n}</li>`).join('')}</ul></div>`;
    renderDupManual(rows, nameCol, headers);
  } else {
    dupEl.className = 'hidden';
    const sec = document.getElementById('manual-dup-section');
    sec.className = 'hidden';
    sec.innerHTML = '';
  }
  checkReady();
});

// ── 重複姓名手動選擇表格 ───────────────────────────────────────────────
function renderDupManual(rows, nameCol, allHeaders) {
  const sec = document.getElementById('manual-dup-section');
  sec.className = '';

  // 優先顯示這些欄位
  const PRIORITY = ['序號', '姓名', '學生姓名', '座號', '年級', '目前年級', '班級', '身分類別', '身分證統一編號'];
  const showCols = [];
  for (const p of PRIORITY) {
    const found = allHeaders.find(h => h === p || h.includes(p));
    if (found && !showCols.includes(found)) showCols.push(found);
  }
  for (const h of allHeaders) {
    if (showCols.length >= 7) break;
    if (!showCols.includes(h)) showCols.push(h);
  }

  let html =
    `<div style="font-size:0.88rem;color:var(--text-soft);margin-bottom:12px;">` +
    `⬇️ 以下重複姓名不會自動加入，請針對每個姓名選擇要加入的那一筆（或全部跳過）：</div>`;

  duplicateNames.forEach(name => {
    const matches = rows.filter(r => String(r[nameCol] || '').trim() === name);
    // 用底線取代特殊字元作為 radio name，避免 CSS 選擇器問題
    const safeId  = 'dup_' + name.split('').map(c => /[\w\u4e00-\u9fff]/.test(c) ? c : '_').join('');
    html +=
      `<div class="dup-manual-item">` +
      `<h4>「${name}」— 共出現 ${matches.length} 次，請選擇要加入的一筆：</h4>` +
      `<div style="overflow-x:auto;">` +
      `<table class="dup-manual-table">` +
      `<tr><th>選擇</th>${showCols.map(k => `<th>${k}</th>`).join('')}</tr>` +
      matches.map((r, i) =>
        `<tr>` +
        `<td style="text-align:center;"><input type="radio" class="dup-radio" name="${safeId}" value="${i}"></td>` +
        showCols.map(k => `<td>${r[k] !== undefined ? r[k] : ''}</td>`).join('') +
        `</tr>`
      ).join('') +
      `<tr>` +
      `<td style="text-align:center;"><input type="radio" class="dup-radio" name="${safeId}" value="-1" checked></td>` +
      `<td colspan="${showCols.length}" style="color:var(--text-muted);font-style:italic;">不加入（跳過）</td>` +
      `</tr>` +
      `</table></div></div>`;
  });

  sec.innerHTML = html;
  sec._rows    = rows;
  sec._nameCol = nameCol;
}

function getResolvedExtraNames() {
  const sec = document.getElementById('manual-dup-section');
  if (!sec._rows) return [];
  const extras = [];
  duplicateNames.forEach(name => {
    const safeId = 'dup_' + name.split('').map(c => /[\w\u4e00-\u9fff]/.test(c) ? c : '_').join('');
    let chosen = -1;
    document.querySelectorAll(`input[name="${safeId}"]`).forEach(r => {
      if (r.checked) chosen = parseInt(r.value);
    });
    if (chosen >= 0) extras.push(name);
  });
  return extras;
}

// ── 全校名單上傳 ───────────────────────────────────────────────────────
setupZone('zone2', 'file2', (fname, rows) => {
  schoolRows = rows;
  const info = document.getElementById('file2-info');
  info.className = 'file-info';
  info.innerHTML =
    `<span>🏫</span>` +
    `<span class="fname">${fname}</span>` +
    `<span class="fcount">共 ${rows.length} 筆學生資料</span>`;
  checkReady();
});

function checkReady() {
  document.getElementById('btn-merge').disabled = !(examRows.length && schoolRows.length);
}

// ── 整合邏輯 ───────────────────────────────────────────────────────────
document.getElementById('btn-merge').addEventListener('click', doMerge);

function doMerge() {
  const alertsEl = document.getElementById('merge-alerts');
  alertsEl.innerHTML = '';

  const headers = Object.keys(schoolRows[0] || {});
  const nameCol = findCol(headers, SCHOOL_ALIAS.name);
  const clsCol  = findCol(headers, SCHOOL_ALIAS.cls);
  const seatCol = findCol(headers, SCHOOL_ALIAS.seat);
  const idCol   = findCol(headers, SCHOOL_ALIAS.id);

  if (!nameCol || !clsCol) {
    alertsEl.innerHTML =
      `<div class="alert alert-danger"><span class="alert-icon">❌</span>` +
      `全校名單缺少必要欄位（需有：姓名、班級）。<br>` +
      `偵測到的欄位：${headers.join('、')}</div>`;
    return;
  }

  // 建立 name → rows 查找表
  const schoolMap = {};
  schoolRows.forEach(r => {
    const n = String(r[nameCol] || '').trim();
    if (!schoolMap[n]) schoolMap[n] = [];
    schoolMap[n].push(r);
  });

  const extras      = getResolvedExtraNames();
  const targetNames = [...examNames, ...extras];
  const notFound    = [];
  const multiMatch  = [];
  const emptyId     = [];
  mergedData = [];

  targetNames.forEach(name => {
    let matches = schoolMap[name];
    if (!matches || !matches.length) { notFound.push(name); return; }  // 考試名單 row 已在 examRowMap 可查

    // 若考試名單有班級資訊，用班級精確比對縮減多筆
    if (matches.length > 1 && examClsMap[name]) {
      const examCls = String(examClsMap[name]).trim();
      // 嘗試用最後一碼比對（e.g. 考試名單班級=4 → 全校204, 402都取最後碼=4）
      const filtered = matches.filter(r => {
        const sc = String(r[clsCol] || '').trim();
        return extractGrade(sc) === examCls || sc === examCls;
      });
      if (filtered.length === 1) matches = filtered; // 精確匹配到唯一一筆
    }

    if (matches.length > 1) multiMatch.push({ name, rows: matches, clsCol, seatCol, idCol });

    matches.forEach(r => {
      const cls   = String(r[clsCol]  || '').trim();
      const idVal = idCol   ? String(r[idCol]   || '').trim() : '';
      const seat  = seatCol ? String(parseInt(r[seatCol]) || r[seatCol] || '').trim() : '';
      if (!idVal) emptyId.push(name);
      mergedData.push({
        '學生姓名'                                       : name,
        '身分證統一編號'                                  : idVal,
        '入學年度'                                        : (examEntryYearMap[name] || calcEntryYear(cls)),
        '目前班級'                                        : extractGrade(cls),
        '座號(選填)'                                      : seat,
        'OpenID(選填)'                                    : '',
        '身分類別(必填，多重身分請以空白分隔)'             : '99',
        '其他學習扶助資源(選填，多重資源請以空白分隔)'     : '',
        '所在位置'                                        : '',
      });
    });
  });

  // 提示訊息
  let html = '';
  if (emptyId.length) {
    const uniq = [...new Set(emptyId)];
    html += makeAlert('warn', '⚠️',
      `${uniq.length} 位學生的身分證在全校名單中是空的，請手動補充：`, uniq);
  }
  if (notFound.length)  html += makeNotFoundAlert(notFound);
  if (multiMatch.length) html += makeMultiMatchAlert(multiMatch);
  if (mergedData.length) {
    html += `<div class="alert alert-success"><span class="alert-icon">✅</span>` +
      `<strong>整合完成！共 ${mergedData.length} 筆資料，請確認下方預覽後再匯出。</strong></div>`;
  } else {
    html += `<div class="alert alert-danger"><span class="alert-icon">❌</span>` +
      `沒有任何資料可整合，請確認兩個檔案的姓名是否相符。</div>`;
  }
  alertsEl.innerHTML = html;

  // 統計
  const statsEl = document.getElementById('stats-row');
  statsEl.className = 'stat-row';
  statsEl.innerHTML =
    `<div class="stat"><div class="stat-num">${targetNames.length}</div><div class="stat-label">考試名單人數</div></div>` +
    `<div class="stat"><div class="stat-num">${mergedData.length}</div><div class="stat-label">成功匹配筆數</div></div>` +
    `<div class="stat"><div class="stat-num" style="color:${notFound.length ? 'var(--warn)' : 'var(--accent)'};">${notFound.length}</div><div class="stat-label">找不到人數</div></div>` +
    `<div class="stat"><div class="stat-num">${duplicateNames.length}</div><div class="stat-label">重複姓名數</div></div>`;

  const OUTPUT_COLS = [
    '學生姓名', '身分證統一編號', '入學年度', '目前班級',
    '座號(選填)', 'OpenID(選填)',
    '身分類別(必填，多重身分請以空白分隔)',
    '其他學習扶助資源(選填，多重資源請以空白分隔)',
    '所在位置'
  ];
  renderPreview(mergedData, OUTPUT_COLS);
  document.getElementById('btn-export').disabled = mergedData.length === 0;
}

function makeNotFoundAlert(names) {
  // 取考試名單的欄位（優先顯示序號、班級、座號、年級等）
  const examHeaders = examRows.length ? Object.keys(examRows[0]) : [];
  const PRIORITY = ['序號','姓名','學生姓名','年級','目前年級','班級','座號','身分類別','身分證統一編號'];
  const showCols = [];
  for (const p of PRIORITY) {
    const f = examHeaders.find(h => h === p || h.includes(p));
    if (f && !showCols.includes(f)) showCols.push(f);
  }
  for (const h of examHeaders) {
    if (showCols.length >= 8) break;
    if (!showCols.includes(h)) showCols.push(h);
  }

  const tableRows = names.map(name => {
    const r = examRowMap[name] || {};
    return `<tr style="background:#fff8ee;">` +
      showCols.map(k => `<td style="padding:5px 10px;border:1px solid #f5c97a;">${r[k] !== undefined ? r[k] : ''}</td>`).join('') +
      `</tr>`;
  }).join('');

  const thead = showCols.map(k =>
    `<th style="padding:5px 10px;border:1px solid #e0a040;background:#fde8b0;text-align:left;">${k}</th>`
  ).join('');

  return `<div class="alert alert-warn" style="flex-direction:column;gap:8px;">
    <div style="display:flex;gap:8px;align-items:center;">
      <span class="alert-icon">⚠️</span>
      <strong>${names.length} 位學生在全校名單中找不到，以下是他們在「考試名單」中的資料：</strong>
    </div>
    <div style="overflow-x:auto;margin-top:4px;">
      <table style="border-collapse:collapse;font-size:0.82rem;width:100%;">
        <thead><tr>${thead}</tr></thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>
    <div style="font-size:0.78rem;color:#7a4f00;">💡 請確認姓名是否打錯，或此學生尚未建檔於全校名單。</div>
  </div>`;
}

function makeMultiMatchAlert(multiList) {
  const schoolHeaders = Object.keys(schoolRows[0] || {});
  const SHOW = ['班級','座號','姓名','身分證','性別'];
  const showCols = SHOW.map(p => schoolHeaders.find(h => h.includes(p))).filter(Boolean)
    .filter((v,i,a) => a.indexOf(v)===i);

  let inner = multiList.map(item => {
    const rows = item.rows;
    const tableRows = rows.map(r =>
      `<tr>${showCols.map(k => `<td>${r[k] !== undefined ? r[k] : ''}</td>`).join('')}</tr>`
    ).join('');
    return `<div style="margin-bottom:10px;">
      <div style="font-weight:600;margin-bottom:4px;">「${item.name}」— ${rows.length} 筆，已全部加入：</div>
      <div style="overflow-x:auto;">
      <table style="border-collapse:collapse;font-size:0.82rem;width:100%;">
        <thead><tr style="background:#f5e8c8;">${showCols.map(k=>`<th style="padding:5px 10px;border:1px solid #e0c87a;text-align:left;">${k}</th>`).join('')}</tr></thead>
        <tbody>${tableRows}</tbody>
      </table>
      </div>
    </div>`;
  }).join('');

  return `<div class="alert alert-warn" style="flex-direction:column;gap:8px;">
    <div style="display:flex;gap:8px;align-items:center;">
      <span class="alert-icon">🔍</span>
      <strong>${multiList.length} 位學生在全校名單有多筆資料，已全部加入，請確認是否正確：</strong>
    </div>
    <div style="margin-top:4px;">${inner}</div>
  </div>`;
}

function makeAlert(type, icon, title, names) {
  return (
    `<div class="alert alert-${type}"><span class="alert-icon">${icon}</span>` +
    `<div><strong>${title}</strong>` +
    `<ul class="dup-list">${names.map(n => `<li>${n}</li>`).join('')}</ul></div></div>`
  );
}

// ── 預覽表格 ───────────────────────────────────────────────────────────
function renderPreview(data, cols) {
  document.getElementById('preview-wrap').className = '';
  const thead = document.querySelector('#preview-table thead');
  const tbody = document.querySelector('#preview-table tbody');
  thead.innerHTML = `<tr>${cols.map(c => `<th>${c}</th>`).join('')}</tr>`;
  if (!data.length) {
    tbody.innerHTML = `<tr><td colspan="${cols.length}" class="table-empty">無資料</td></tr>`;
    return;
  }
  tbody.innerHTML = data.map(r =>
    `<tr>${cols.map(c => {
      const v = r[c] !== undefined ? r[c] : '';
      if (c === '身分類別(必填，多重身分請以空白分隔)')
        return `<td><span class="tag tag-ok">${v}</span></td>`;
      if (c === '身分證統一編號' && !v)
        return `<td><span class="tag tag-miss">空白</span></td>`;
      return `<td>${v}</td>`;
    }).join('')}</tr>`
  ).join('');
}

// ── 匯出 Excel ─────────────────────────────────────────────────────────
document.getElementById('btn-export').addEventListener('click', () => {
  if (!mergedData.length) return;
  const cols = [
    '學生姓名', '身分證統一編號', '入學年度', '目前班級',
    '座號(選填)', 'OpenID(選填)',
    '身分類別(必填，多重身分請以空白分隔)',
    '其他學習扶助資源(選填，多重資源請以空白分隔)',
    '所在位置'
  ];
  const ws = XLSX.utils.json_to_sheet(mergedData, { header: cols });
  ws['!cols'] = [14, 18, 10, 10, 10, 14, 30, 30, 10].map(w => ({ wch: w }));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '學習扶助名單');
  const d = new Date();
  const stamp = `${d.getFullYear()}${String(d.getMonth() + 1).padStart(2, '0')}${String(d.getDate()).padStart(2, '0')}`;
  XLSX.writeFile(wb, `學習扶助名單_${stamp}.xlsx`);
});
</script>

</html>
