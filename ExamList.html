<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>篩選測驗名單管理系統 — 新莊國小</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --blue:#1e3a8a;--blue2:#2563eb;--blue3:#3b82f6;
  --teal:#0d9488;--teal2:#14b8a6;
  --bg:#f1f5f9;--white:#fff;--text:#1e293b;--muted:#64748b;
  --border:#e2e8f0;--red:#dc2626;--green:#16a34a;--amber:#d97706;--purple:#7c3aed;
  --sh:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);
  --sh2:0 4px 16px rgba(0,0,0,.1);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── HEADER ── */
.hdr{background:linear-gradient(135deg,#1e3a8a 0%,#1e40af 100%);color:#fff;
  padding:12px 20px;display:flex;align-items:center;gap:12px;box-shadow:var(--sh2);position:sticky;top:0;z-index:100}
.hdr-ico{width:42px;height:42px;background:var(--teal);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.hdr h1{font-size:16px;font-weight:700;line-height:1.3}
.hdr p{font-size:11px;opacity:.75;margin-top:1px}
.hdr-r{margin-left:auto;display:flex;align-items:center;gap:8px}
.fb-dot{width:8px;height:8px;border-radius:50%;background:#94a3b8;flex-shrink:0;transition:.3s}
.fb-dot.ok{background:#4ade80}
.fb-dot.err{background:#f87171}
#fb-status{font-size:11px;opacity:.75}

/* ── NAV ── */
.nav{background:#1e3a8a;display:flex;overflow-x:auto;border-bottom:3px solid var(--teal);scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.ntab{padding:9px 16px;background:none;border:none;color:rgba(255,255,255,.6);
  font:500 12px 'Noto Sans TC',sans-serif;cursor:pointer;white-space:nowrap;transition:.15s;position:relative;border-bottom:3px solid transparent;margin-bottom:-3px}
.ntab:hover{color:#fff;background:rgba(255,255,255,.1)}
.ntab.on{color:#fff;background:rgba(255,255,255,.1);border-bottom-color:var(--teal2)}

/* ── MAIN ── */
.main{padding:18px;max-width:1440px;margin:0 auto}
.tab{display:none}.tab.on{display:block}
.card{background:var(--white);border-radius:12px;padding:18px;box-shadow:var(--sh);margin-bottom:16px}
.card-hd{font-size:14px;font-weight:600;color:var(--blue);margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid var(--border);display:flex;align-items:center;gap:7px}
.card-hd .badge-count{background:var(--blue2);color:#fff;font-size:11px;padding:1px 7px;border-radius:10px;font-weight:500;margin-left:auto}

/* ── UPLOAD ZONE ── */
.upzone{border:2px dashed var(--border);border-radius:8px;padding:26px 20px;text-align:center;cursor:pointer;transition:.2s;position:relative}
.upzone:hover,.upzone.drag{border-color:var(--teal);background:rgba(13,148,136,.05)}
.upzone .ico{font-size:30px;margin-bottom:6px}
.upzone p{color:var(--muted);font-size:12px;line-height:1.6}
.upzone strong{color:var(--teal)}
input[type=file]{display:none}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:6px;border:none;font:500 12px 'Noto Sans TC',sans-serif;cursor:pointer;transition:.15s;user-select:none}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-blue{background:var(--blue2);color:#fff}.btn-blue:hover:not(:disabled){background:var(--blue)}
.btn-teal{background:var(--teal);color:#fff}.btn-teal:hover:not(:disabled){background:#0f766e}
.btn-red{background:var(--red);color:#fff}.btn-red:hover:not(:disabled){opacity:.85}
.btn-gray{background:#475569;color:#fff}.btn-gray:hover:not(:disabled){background:#334155}
.btn-out{background:#fff;color:var(--blue);border:1px solid var(--border)}.btn-out:hover:not(:disabled){background:var(--bg)}
.btn-sm{padding:3px 9px;font-size:11px}

/* ── TABLES ── */
.tw{overflow-x:auto;border-radius:8px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:var(--blue);color:#fff;padding:8px 10px;text-align:left;font-weight:500;white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);transition:.1s}
tbody tr:hover{background:rgba(13,148,136,.05)}
tbody td{padding:6px 10px;vertical-align:middle}
tfoot td{padding:8px 10px;background:#f8fafc;font-weight:600;font-size:12px;border-top:2px solid var(--border)}

/* ── BADGES ── */
.b{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:600;white-space:nowrap}
.b-fail{background:#fef2f2;color:var(--red);border:1px solid #fecaca}
.b-pass{background:#f0fdf4;color:var(--green);border:1px solid #bbf7d0}
.b-mt{background:#f8fafc;color:var(--muted);border:1px solid var(--border)}
.b-req{background:#fff7ed;color:var(--amber);border:1px solid #fed7aa}
.b-sel{background:#faf5ff;color:var(--purple);border:1px solid #e9d5ff}

/* ── STAT GRID ── */
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px;margin-bottom:16px}
.sc{background:var(--white);border-radius:10px;padding:14px;box-shadow:var(--sh);border-left:4px solid var(--teal)}
.sc.red{border-left-color:var(--red)}.sc.amber{border-left-color:var(--amber)}.sc.blue{border-left-color:var(--blue2)}
.sc .lbl{font-size:11px;color:var(--muted);margin-bottom:2px}
.sc .val{font-size:24px;font-weight:700;color:var(--blue);font-family:'JetBrains Mono',monospace}
.sc .sub{font-size:11px;color:var(--muted);margin-top:2px}
.sc .bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:7px}
.sc .fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--blue2));border-radius:3px;transition:width .5s}

/* ── ALERTS ── */
.al{padding:10px 13px;border-radius:8px;font-size:12px;margin-bottom:10px;display:flex;gap:8px;align-items:flex-start;line-height:1.5}
.al-warn{background:#fffbeb;color:#92400e;border:1px solid #fde68a}
.al-info{background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe}
.al-ok{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0}
.al-err{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}

.ghd{background:linear-gradient(90deg,var(--blue),var(--blue2));color:#fff;padding:8px 14px;border-radius:8px;margin:12px 0 7px;font-weight:600;font-size:13px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.ghd .chips{display:flex;gap:6px;flex-wrap:wrap}
.ghd .chip{background:rgba(255,255,255,.2);border-radius:10px;padding:2px 10px;font-size:11px;font-weight:500}
.ghd .chip.ok{background:rgba(74,222,128,.3)}
.ghd .chip.red{background:rgba(248,113,113,.3)}

.stabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.stab{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:#fff;font:12px 'Noto Sans TC',sans-serif;cursor:pointer;transition:.15s}
.stab.on{background:var(--blue);color:#fff;border-color:var(--blue)}

.sinfo{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.chip2{background:#fff;border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:12px;display:inline-flex;align-items:center;gap:5px}
.chip2 .n{font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--blue)}
.chip2.teal{border-color:var(--teal);color:var(--teal)}.chip2.green{border-color:var(--green)}.chip2.red{border-color:var(--red)}

.loading{display:flex;align-items:center;justify-content:center;gap:8px;padding:40px;color:var(--muted);font-size:13px}
.spin{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:36px;color:var(--muted)}.empty .ico{font-size:36px;margin-bottom:8px}.empty p{font-size:12px}

/* ── TOAST ── */
#tst{position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:6px}
.toast{background:#1e3a8a;color:#fff;padding:10px 14px;border-radius:8px;font-size:12px;box-shadow:var(--sh2);animation:tin .3s ease;max-width:320px;line-height:1.5}
.toast.ok{background:#15803d}.toast.err{background:#b91c1c}.toast.warn{background:#b45309}
@keyframes tin{from{transform:translateX(110%);opacity:0}to{transform:none;opacity:1}}

.sel{padding:6px 10px;border:1px solid var(--border);border-radius:6px;font:12px 'Noto Sans TC',sans-serif;outline:none;background:#fff;cursor:pointer;color:var(--text)}
.fw6{font-weight:600}.mono{font-family:'JetBrains Mono',monospace}.mu{color:var(--muted)}.fs11{font-size:11px}

/* ─── LOGIN OVERLAY ─── */
#login-overlay{
  position:fixed;inset:0;z-index:9000;
  background:linear-gradient(135deg,#0f172a 0%,#1e3a8a 60%,#0d9488 100%);
  display:flex;align-items:center;justify-content:center;
}
#login-overlay.hide{display:none}
.login-box{
  background:#fff;border-radius:16px;padding:36px 32px;
  box-shadow:0 20px 60px rgba(0,0,0,.4);
  text-align:center;width:320px;max-width:90vw;
}
.login-box .logo{font-size:40px;margin-bottom:12px}
.login-box h2{font-size:18px;font-weight:700;color:var(--blue);margin-bottom:4px}
.login-box p{font-size:12px;color:var(--muted);margin-bottom:20px}
.login-box input{
  width:100%;padding:10px 14px;border:2px solid var(--border);border-radius:8px;
  font:14px 'Noto Sans TC',sans-serif;outline:none;margin-bottom:10px;
  letter-spacing:3px;text-align:center;color:var(--text)
}
.login-box .btn-login{width:100%;padding:10px;border-radius:8px;border:none;
  background:var(--blue);color:#fff;font:600 14px 'Noto Sans TC',sans-serif;cursor:pointer;transition:.15s}

/* ─── EDIT MODE BUTTON ─── */
#edit-btn{
  padding:5px 13px;border-radius:6px;border:1px solid rgba(255,255,255,.35);
  background:rgba(255,255,255,.12);color:#fff;
  font:500 11px 'Noto Sans TC',sans-serif;cursor:pointer;transition:.15s;
  display:flex;align-items:center;gap:5px;white-space:nowrap;
}
#edit-btn.on{background:var(--teal);border-color:var(--teal2)}
body.view-only .no-edit{pointer-events:none;opacity:.5}
body.view-only .edit-lock-msg{display:block}
.edit-lock-msg{display:none;text-align:center;padding:12px;font-size:12px;color:var(--muted);background:#f8fafc;border-radius:8px;border:1px dashed var(--border);margin-bottom:10px;}

/* ─── SCROLL TO TOP ─── */
#scroll-top{position:fixed;right:14px;bottom:16px;z-index:600;width:40px;height:40px;border-radius:50%;border:none;background:#0d9488;color:#fff;font-size:16px;font-weight:700;box-shadow:0 4px 14px rgba(0,0,0,.25);cursor:pointer;opacity:0;transform:translateY(10px);transition:.25s;pointer-events:none;}
#scroll-top.vis{opacity:1;transform:none;pointer-events:auto}

/* ─── FLOAT PANEL ─── */
#b35-float{position:fixed;right:14px;top:50%;transform:translateY(-50%);z-index:500;display:flex;flex-direction:column;background:#1e3a8a;color:#fff;border-radius:12px;box-shadow:0 8px 28px rgba(0,0,0,.25);min-width:100px;overflow:hidden;}
.b35fp-hd{background:var(--teal);padding:6px 10px;font-size:10px;font-weight:700;text-align:center;letter-spacing:.5px;text-transform:uppercase;}
.b35fp-row{display:flex;align-items:center;justify-content:space-between;padding:5px 10px;gap:8px;border-bottom:1px solid rgba(255,255,255,.1);}
.b35fp-val{font-size:13px;font-weight:700;font-family:'JetBrains Mono',monospace;}
.b35fp-val.done{color:#4ade80}.b35fp-val.need{color:#f87171}
.b35fp-bar{height:3px;background:rgba(255,255,255,.15);border-radius:2px;margin:0 10px 5px;overflow:hidden}
.b35fp-fill{height:100%;border-radius:2px;transition:width .3s;background:var(--teal2)}
.b35fp-fill.done{background:#4ade80}

@media print{
  .hdr,.nav,.no-print,#tst{display:none!important}
  .main{padding:0!important;max-width:100%}
  body{background:#fff}
  .card{box-shadow:none!important;border:1px solid #ddd!important;page-break-inside:avoid}
  .tab.on{display:block!important}
  .page-break{page-break-after:always}
  .print-header{display:block!important;text-align:center;margin-bottom:12px}
  .print-info{display:flex!important;font-size:12px;margin-bottom:8px;gap:16px}
}
.print-header,.print-info{display:none}
</style>
</head>

const cfg = {
  apiKey: "AIzaSyDqOkKvL3k-snAYDs17fLsc1I156_xS-QI",
  authDomain: "sjps-learningassistance.firebaseapp.com",
  projectId: "sjps-learningassistance",
  storageBucket: "sjps-learningassistance.firebasestorage.app",
  messagingSenderId: "108951710153",
  appId: "1:108951710153:web:434de73a24160fe3e2e018"
};

const app = initializeApp(cfg);
const db = getFirestore(app);
const auth = getAuth(app);

window._db = db;
window._fs = { collection, getDoc, getDocs, setDoc, doc, updateDoc };

document.dispatchEvent(new Event('fbReady'));

<script>
// ─── CONSTANTS & STATE ───
const GRADE_TOTALS={1:161,2:156,3:198,4:220,5:218,6:220};
const SUBJ_LABEL={chinese:'國語',math:'數學',english:'英語'};
let REQ=[]; let B35=[]; let filterSubj='chinese'; let b35Subj='chinese';
let pendingReq=null; let pendingB35=null;
let isEditMode=false;

// ─── FIREBASE HELPERS (統一打包寫法) ───
async function fbBatchWrite(docName, docs){
  const { doc:docRef, collection:col, setDoc:setd } = window._fs;
  const payload = { data: Array.isArray(docs)?docs:[], timestamp: Date.now() };
  await setd(docRef(col(window._db, 'exam_list'), docName), payload);
}

async function fbLoadAll(){
  const { doc:docRef, collection:col, getDoc } = window._fs;
  const [rs, bs] = await Promise.all([
    getDoc(docRef(col(window._db,'exam_list'), 'requiredExam')),
    getDoc(docRef(col(window._db,'exam_list'), 'bottom35'))
  ]);
  REQ = (rs.exists() && rs.data().data) ? rs.data().data : [];
  const rawB35 = (bs.exists() && bs.data().data) ? bs.data().data : [];
  B35 = rawB35.map(d => ({ ...d, selChinese:!!d.selChinese, selMath:!!d.selMath, selEnglish:!!d.selEnglish }));
}

async function loadAll(){
  const status=document.getElementById('fb-status');
  const dot=document.getElementById('fb-dot');
  status.textContent='載入中…';
  try {
    await fbLoadAll();
    status.textContent='已連線'; dot.className='fb-dot ok';
    updateDBStatus(); renderAll();
    toast('資料載入成功','ok');
  } catch(e) {
    status.textContent='連線失敗'; dot.className='fb-dot err';
    toast('讀取失敗，請確認安全規則權限','err');
  }
}

function updateDBStatus(){
  document.getElementById('db-req-cnt').textContent=REQ.length;
  document.getElementById('db-b35-cnt').textContent=B35.length;
  document.getElementById('db-sel-cnt').textContent=B35.filter(b=>b.selChinese||b.selMath||b.selEnglish).length;
  document.getElementById('req-count').textContent=REQ.length+' 筆';
  document.getElementById('b35-count').textContent=B35.length+' 筆';
}

// ─── RENDER LOGIC ───
function renderAll(){
  const active = document.querySelector('.ntab.on')?.dataset?.tab;
  if(active === 'filter') renderFilter();
  if(active === 'rate') renderRate();
  if(active === 'b35') renderB35();
  if(active === 'examlist') renderExamList();
  if(active === 'stat1') renderStat1();
  if(active === 'stat2') renderStat2();
  if(active === 'gradesum') renderGradeSummary();
  populateExamGradeSelect();
}

function renderB35(){
  const el=document.getElementById('b35-content');
  if(!B35.length){ el.innerHTML='<p class="empty">尚無資料</p>'; return; }
  const grade=parseInt(document.getElementById('b35-grade').value);
  let list = B35.filter(s => !grade || s.grade === grade).sort((a,b)=>(a[b35Subj]||0)-(b[b35Subj]||0));
  
  let html = `<div class="ghd">顯示 ${SUBJ_LABEL[b35Subj]} 排序名單</div>`;
  html += `<div class="card" style="padding:0"><div class="tw"><table><thead><tr><th>加入</th><th>班級</th><th>座號</th><th>姓名</th><th>分數</th><th>狀態</th></tr></thead><tbody>`;
  list.forEach(s => {
    const isSel = s['sel'+b35Subj[0].toUpperCase()+b35Subj.slice(1)];
    html += `<tr style="${isSel?'background:#faf5ff':''}">
      <td><input type="checkbox" ${isSel?'checked':''} onchange="toggleB35Select('${s.id}','${b35Subj}',this.checked)"></td>
      <td>${s.grade}年${s.classNum}班</td><td>${s.seat}</td><td>${s.name}</td><td>${s[b35Subj]||'—'}</td>
      <td>${isSel?'<span class="b b-sel">✔ 已選</span>':''}</td>
    </tr>`;
  });
  html += `</tbody></table></div></div>`;
  el.innerHTML=html;
  updateB35FloatPanel();
}

async function toggleB35Select(id, subj, checked){
  if(!isEditMode){ toast('請先解鎖編輯模式','err'); renderB35(); return; }
  const s = B35.find(x => x.id === id); if(!s) return;
  const field = 'sel'+subj[0].toUpperCase()+subj.slice(1);
  s[field] = checked;
  try {
    await fbBatchWrite('bottom35', B35);
    updateDBStatus(); renderB35();
  } catch(e) { toast('儲存失敗，權限不足','err'); s[field]=!checked; renderB35(); }
}

function updateB35FloatPanel(){
  const panel=document.getElementById('b35-float');
  const onB35=document.querySelector('.ntab.on')?.dataset?.tab==='b35';
  if(!onB35 || !B35.length){ panel.style.display='none'; return; }
  panel.style.display='block';
  let html = '<div class="b35fp-hd">選人進度</div>';
  [1,2,3,4,5,6].forEach(g => {
    const tgt = Math.ceil(GRADE_TOTALS[g]*0.05);
    const sel = B35.filter(b => b.grade===g && (b.selChinese||b.selMath||b.selEnglish)).length;
    const pct = Math.min(100, (sel/tgt)*100);
    html += `<div class="b35fp-row"><span class="fs11">${g}年級</span><span class="b35fp-val ${sel>=tgt?'done':'need'}">${sel}/${tgt}</span></div>
             <div class="b35fp-bar"><div class="b35fp-fill" style="width:${pct}%"></div></div>`;
  });
  document.getElementById('b35-float-inner').innerHTML=html;
}

// ─── UPLOAD HANDLERS ───
document.getElementById('file-req').onchange = async (e) => {
  const f=e.target.files[0]; if(!f) return;
  const { students } = await parseExcel(f, 'required');
  pendingReq = students;
  document.getElementById('btn-save-req').disabled=false;
  document.getElementById('req-preview').innerHTML=`<div class="al al-ok">解析成功：${students.length} 筆資料</div>`;
};
document.getElementById('file-b35').onchange = async (e) => {
  const f=e.target.files[0]; if(!f) return;
  const { students } = await parseExcel(f, 'bottom35');
  pendingB35 = students;
  document.getElementById('btn-save-b35').disabled=false;
  document.getElementById('b35-preview').innerHTML=`<div class="al al-ok">解析成功：${students.length} 筆資料</div>`;
};

async function saveRequiredList(){
  try { await fbBatchWrite('requiredExam', pendingReq); REQ=pendingReq; pendingReq=null; document.getElementById('btn-save-req').disabled=true; loadAll(); } 
  catch(e){ toast('儲存失敗','err'); }
}
async function saveBottom35List(){
  try { await fbBatchWrite('bottom35', pendingB35); B35=pendingB35; pendingB35=null; document.getElementById('btn-save-b35').disabled=true; loadAll(); } 
  catch(e){ toast('儲存失敗','err'); }
}

// ─── AUTH & TOOLS ───
function doLogin(){
  const pw=document.getElementById('login-pw').value;
  if(pw === '073411373' || pw === 'admin'){
    document.getElementById('login-overlay').classList.add('hide');
    if(pw==='admin') activateEditMode();
  } else { document.getElementById('login-err').textContent='密碼錯誤'; }
}
function toggleEditMode(){
  if(isEditMode){ isEditMode=false; document.body.classList.add('view-only'); updateEditBtn(); return; }
  if(!window._firebaseAuth?.currentUser){ toast('❌ 請先至控制中心登入管理員帳號！','err'); return; }
  if(prompt('管理員密碼')==='admin') activateEditMode();
}
function activateEditMode(){ isEditMode=true; document.body.classList.remove('view-only'); updateEditBtn(); }
function updateEditBtn(){
  const btn=document.getElementById('edit-btn');
  btn.textContent=isEditMode?'✏️ 編輯模式':'🔒 瀏覽模式';
  btn.classList.toggle('on', isEditMode);
}

function toast(m,t){
  const e=document.createElement('div'); e.className=`toast ${t}`; e.textContent=m;
  document.getElementById('tst').appendChild(e); setTimeout(()=>e.remove(),3000);
}

// ─── EXCEL PARSING HELPER ───
function parseExcel(file, type){
  return new Promise((res)=>{
    const rd=new FileReader();
    rd.onload=(e)=>{
      const wb=XLSX.read(e.target.result,{type:'binary'});
      const data=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
      const students = data.map((r,i)=>({
        id: type+Date.now()+i,
        name: r['姓名'], grade: parseInt(r['年級']||r['目前年級']||Math.floor(r['班級']/100)),
        classNum: parseInt(r['班級'])%100 || r['班級'], seat: r['座號'],
        chinese: r['國語']||r['國文分數']||r['國語文測驗'],
        math: r['數學']||r['數學分數']||r['數學測驗'],
        english: r['英語']||r['英語分數']||r['英語測驗'],
        identity: r['身分類別']||r['身份註記']||''
      })).filter(s=>s.name);
      res({students});
    };
    rd.readAsBinaryString(file);
  });
}

function setB35Subj(s,btn){
  b35Subj=s; document.querySelectorAll('#b35-stabs .stab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on'); renderB35();
}

// ─── TAB NAV ───
document.querySelectorAll('.ntab').forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll('.ntab').forEach(b=>b.classList.remove('on'));
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
    btn.classList.add('on'); document.getElementById('tab-'+btn.dataset.tab).classList.add('on');
    renderAll();
  };
});

function populateExamGradeSelect(){
  const sel=document.getElementById('exam-grade'); if(!sel || sel.options.length > 1) return;
  [1,2,3,4,5,6].forEach(g=>sel.add(new Option(g+'年級', g)));
}
function populateExamClassSelect(){
  const g=parseInt(document.getElementById('exam-grade').value);
  const sel=document.getElementById('exam-class'); sel.innerHTML='<option value="0">全部班級</option>';
  const classes=[...new Set(REQ.filter(s=>!g||s.grade===g).map(s=>s.classNum))].sort((a,b)=>a-b);
  classes.forEach(c=>sel.add(new Option(c+'班', c)));
}

// ─── INIT ───
document.addEventListener('fbReady', loadAll);
</script>
