<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>學生排班系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F2EFE9;--surface:#FFF;--border:#DDD8D0;
  --text:#1C1917;--text-muted:#78716C;
  --guide:#7C3AED;--reg:#0369A1;--id:#B45309;
  --shadow:0 1px 3px rgba(0,0,0,.09),0 1px 2px rgba(0,0,0,.06);
  --shadow-md:0 4px 8px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.05);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── Header ── */
header{background:#1C1917;color:#FFF;padding:0 16px;height:48px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:200}
.app-logo{font-size:19px;font-weight:900;letter-spacing:-.5px;white-space:nowrap}
.app-logo span{color:#F59E0B}
.tabs{display:flex;gap:3px;background:rgba(255,255,255,.12);padding:3px;border-radius:7px;flex-shrink:0}
.tab-btn{padding:4px 15px;border-radius:5px;border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;transition:all .2s;background:transparent;color:rgba(255,255,255,.6)}
.tab-btn.active{background:#FFF;color:#1C1917}
.sync-badge{display:flex;align-items:center;gap:5px;font-size:10px;color:rgba(255,255,255,.5);white-space:nowrap;flex-shrink:0;background:rgba(255,255,255,.07);padding:3px 9px;border-radius:5px}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#6EE7B7;flex-shrink:0;transition:background .3s}
.header-right{margin-left:auto;display:flex;align-items:center;gap:7px;flex-shrink:0}
.save-badge{font-size:11px;color:rgba(255,255,255,.5);display:flex;align-items:center;gap:4px;white-space:nowrap}
.save-dot{width:6px;height:6px;border-radius:50%;background:#10B981;transition:background .3s}
.icon-btn{padding:4px 12px;border-radius:6px;border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.08);color:rgba(255,255,255,.72);font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap}
.icon-btn:hover{background:rgba(255,255,255,.18);color:#FFF}
.icon-btn.unlocked{background:#D97706;border-color:#F59E0B;color:#FFF}
.print-btn{padding:4px 12px;border-radius:6px;border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.08);color:rgba(255,255,255,.72);font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap}
.print-btn:hover{background:#059669;border-color:#34D399;color:#FFF}

/* ── Layout ── */
.layout{display:flex;align-items:flex-start}
.sidebar{width:206px;min-width:206px;background:var(--surface);border-right:1px solid var(--border);min-height:calc(100vh - 48px);padding:14px 12px;position:sticky;top:48px;overflow-y:auto;max-height:calc(100vh - 48px);display:none;flex-direction:column}
body.edit-mode .sidebar{display:flex}
.s-title{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.s-title::after{content:'';flex:1;height:1px;background:var(--border)}
.search-input{width:100%;padding:6px 9px;border:1px solid var(--border);border-radius:6px;font-family:inherit;font-size:12px;background:var(--bg);margin-bottom:8px}
.search-input:focus{outline:none;border-color:#94A3B8;background:#FFF}
.pool-card{display:flex;flex-direction:column;gap:1px;padding:6px 8px;border-radius:6px;cursor:grab;border:1.5px solid #DDD8D0;background:#FFF;transition:transform .15s,box-shadow .15s;user-select:none;margin-bottom:3px}
.pool-card:hover{transform:translateY(-1px);box-shadow:var(--shadow-md)}
.pool-card.dragging{opacity:.3;cursor:grabbing}
.pc-num{font-size:12px;font-weight:800;color:var(--text);font-family:'JetBrains Mono',monospace}
.pc-name{font-size:11px;color:var(--text-muted);font-weight:600}
.pool-empty{font-size:11px;color:#94A3B8;text-align:center;padding:12px;background:#F8FAFC;border-radius:6px;line-height:1.6}
.reset-btn{width:100%;padding:7px;border:1px solid var(--border);margin-top:auto;background:var(--bg);border-radius:6px;cursor:pointer;font-family:inherit;font-size:12px;color:var(--text-muted);transition:all .15s}
.reset-btn:hover{border-color:#EF4444;color:#EF4444;background:#FEF2F2}

/* ── Main ── */
.main-content{flex:1;padding:10px 14px;overflow-x:auto;min-width:0}

/* ── Week ── */
.week-block{margin-bottom:14px}
.week-head{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.week-label{font-size:13px;font-weight:900;color:var(--text)}
.week-subj-pill{font-size:10px;padding:2px 9px;border-radius:20px;font-weight:700;border:1.5px solid}

table.sch{border-collapse:collapse;background:var(--surface);border-radius:8px;overflow:hidden;box-shadow:var(--shadow);width:100%;table-layout:fixed}
table.sch th,table.sch td{border:1px solid var(--border)}
.th-corner{background:#292524;color:#FFF;font-size:11px;font-weight:700;padding:5px 7px;text-align:left;vertical-align:middle}
.th-day{text-align:center;padding:5px 3px;background:#FAFAF8;vertical-align:top}
.th-date{font-weight:700;font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--text)}
.th-dow{font-size:9px;color:var(--text-muted);margin:1px 0 3px}

.chip-wrap{display:flex;flex-direction:column;gap:2px;align-items:center;margin-top:3px}
.exam-chip{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:700;white-space:nowrap}
.chip-no{background:#F3F4F6;color:#9CA3AF;border:1px dashed #D1D5DB}
.chip-morning{background:#EAF5FD;color:#0369A1;border:1px solid #BAE6FD}
.chip-lunch{background:#FFF8EF;color:#B45309;border:1px solid #FED7AA}
.chip-both{background:#F0FDF4;color:#15803D;border:1px solid #86EFAC}
.subj-inline{display:inline-block;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:800;margin-left:2px}
.subj-國語{background:#FEE2E2;color:#D92B2B}
.subj-數學{background:#DBEAFE;color:#1D55D4}
.subj-英語{background:#DCFCE7;color:#158A45}
.subj-未定{background:#F3F4F6;color:#9CA3AF}

.rl{font-size:9px;font-weight:700;padding:4px 3px;vertical-align:middle;word-break:keep-all;width:56px;line-height:1.4;text-align:center}
.rl-guide{background:#F3E8FF;color:var(--guide)}
.rl-reg{background:#E0F2FE;color:var(--reg)}
.rl-id{background:#FEF3C7;color:var(--id)}

.dc{vertical-align:middle;padding:3px;transition:background .15s}
.dc-guide{background:#FAF5FF}
.dc-reg{background:#F0F9FF}
.dc-id{background:#FFFBEB}
.dc.over{background:#BFDBFE !important;outline:2px dashed #3B82F6;outline-offset:-2px}
.dc-inactive{background:#F9FAFB;opacity:.28}

.drop-empty{height:48px;display:flex;align-items:center;justify-content:center;color:#D1D5DB;font-size:10px;border:1.5px dashed #E5E7EB;border-radius:5px}
.dc.over .drop-empty{border-color:#93C5FD;color:#93C5FD}

.placed{border-radius:5px;padding:4px 7px;border:1.5px solid;cursor:grab;user-select:none;position:relative;min-height:48px;display:flex;flex-direction:column;justify-content:center;gap:1px}
.placed.dragging{opacity:.3}
.placed-guide{border-color:var(--guide);background:#F5F3FF}
.placed-reg{border-color:var(--reg);background:#EFF9FF}
.placed-id{border-color:var(--id);background:#FFFBEB}
.placed-num{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--text)}
.placed-name{font-size:12px;font-weight:800;color:var(--text)}
.p-rm{position:absolute;top:2px;right:3px;cursor:pointer;font-size:10px;color:#D1D5DB;padding:1px 3px;border-radius:2px}
.p-rm:hover{color:#EF4444;background:#FEE2E2}

body:not(.edit-mode) .pool-card,
body:not(.edit-mode) .placed{cursor:default;pointer-events:none}
body:not(.edit-mode) .p-rm{display:none}
body:not(.edit-mode) .drop-empty{pointer-events:none}

/* ── Modal ── */
.modal-overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.45);backdrop-filter:blur(2px);align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#FFF;border-radius:12px;width:540px;max-height:82vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.2);overflow:hidden}
.modal-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:16px;font-weight:800}
.modal-close{background:none;border:none;cursor:pointer;font-size:18px;color:var(--text-muted);padding:2px 7px;border-radius:4px}
.modal-close:hover{background:var(--bg)}
.modal-body{padding:16px 20px;overflow-y:auto;flex:1}
.modal-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.add-row{display:flex;gap:8px;margin-bottom:14px;align-items:flex-end}
.field-group{display:flex;flex-direction:column;gap:3px;flex:1}
.field-label{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em}
.field-input{padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-family:inherit;font-size:13px;background:var(--bg)}
.field-input:focus{outline:none;border-color:#94A3B8;background:#FFF}
.add-btn{padding:7px 16px;background:#1C1917;color:#FFF;border:none;border-radius:6px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;white-space:nowrap}
.add-btn:hover{background:#292524}
.student-list{display:flex;flex-direction:column;gap:3px}
.student-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border:1px solid var(--border);border-radius:6px;background:var(--bg)}
.stu-num{font-size:12px;font-weight:700;font-family:'JetBrains Mono',monospace;min-width:64px}
.stu-name{font-size:13px;font-weight:600;flex:1}
.stu-del{background:none;border:none;cursor:pointer;color:#D1D5DB;font-size:12px;padding:2px 7px;border-radius:4px}
.stu-del:hover{color:#EF4444;background:#FEF2F2}

/* ── Permission banner ── */
.perm-banner{display:none;margin:8px 0;padding:10px 14px;background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;font-size:12px;color:#991B1B;line-height:1.6}
.perm-banner.show{display:block}
.perm-banner code{background:#FEE2E2;padding:1px 5px;border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:11px}

/* ── Print header (hidden on screen) ── */
.print-page-header{display:none}

/* ════════════════════════════════════════
   PRINT STYLES  —  A4 橫向，每頁兩週
   ════════════════════════════════════════ */
@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  @page{size:A4 landscape;margin:8mm 7mm}

  header,.sidebar,.perm-banner,.no-print,
  .pool-card,.pool-empty,.reset-btn,.search-input,.s-title,
  .p-rm,.drop-empty .text{display:none!important}

  body{background:#FFF!important}
  .layout{display:block!important}
  .main-content{padding:0!important;overflow:visible!important}

  /* Page break: after week 2 */
  .week-block:nth-child(2){margin-bottom:0;page-break-after:always}
  .week-block{break-inside:avoid;margin-bottom:5pt}

  /* Per-page print header */
  .print-page-header{
    display:flex!important;align-items:baseline;justify-content:space-between;
    padding-bottom:4pt;margin-bottom:5pt;
    border-bottom:2pt solid #1C1917;
  }
  .print-page-header:nth-of-type(2){margin-top:0}
  .pph-title{font-size:13pt;font-weight:900;letter-spacing:-.3pt}
  .pph-title span{color:#D97706}
  .pph-sub{font-size:8pt;color:#555}
  .pph-type{font-size:8pt;font-weight:700;padding:1pt 6pt;border-radius:3pt;background:#F3F4F6;border:1pt solid #CCC}

  /* Week head */
  .week-head{margin-bottom:3pt!important}
  .week-label{font-size:10pt!important;font-weight:900!important}
  .week-subj-pill{font-size:7.5pt!important;padding:1pt 6pt!important}

  /* Table */
  table.sch{
    border-collapse:collapse!important;box-shadow:none!important;
    border-radius:0!important;border:1.5pt solid #666!important;
    width:100%!important;table-layout:fixed!important
  }
  table.sch th,table.sch td{border:1pt solid #AAA!important}

  .th-corner{
    background:#1C1917!important;color:#FFF!important;
    font-size:7pt!important;padding:3pt 4pt!important;
    width:38pt!important;vertical-align:middle!important
  }
  .th-day{background:#F0F0EE!important;padding:3pt 2pt!important;vertical-align:top!important}
  .th-date{font-size:9pt!important;font-weight:800!important}
  .th-dow{font-size:7pt!important;margin:0 0 2pt!important}
  .chip-wrap{margin-top:2pt!important;gap:1pt!important}
  .exam-chip{font-size:6.5pt!important;padding:1pt 3pt!important;border-radius:2pt!important}
  .subj-inline{font-size:6pt!important;padding:0 3pt!important}
  .chip-wrap>div:last-child{font-size:6.5pt!important}

  /* Role label */
  .rl{font-size:7pt!important;width:38pt!important;padding:2pt!important;line-height:1.3!important}
  .rl-guide{background:#F3E8FF!important;color:#7C3AED!important}
  .rl-reg  {background:#E0F2FE!important;color:#0369A1!important}
  .rl-id   {background:#FEF3C7!important;color:#B45309!important}
  .rl span {font-size:6pt!important}

  /* Drop cells — become handwrite boxes */
  .dc{padding:2pt!important;vertical-align:middle!important}
  .dc-guide{background:#FAF5FF!important}
  .dc-reg  {background:#F0F9FF!important}
  .dc-id   {background:#FFFBEB!important}
  .dc-inactive{background:#F5F5F5!important;opacity:.22!important}

  .drop-empty{
    height:30pt!important;
    border:1pt dashed #BBB!important;border-radius:2pt!important;
    background:#FAFAFA!important;
    /* hide "拖放此處" text */
    font-size:0!important;color:transparent!important
  }

  /* Placed card */
  .placed{
    min-height:30pt!important;border-width:1pt!important;
    padding:2pt 5pt!important;border-radius:2pt!important;gap:0!important
  }
  .placed-guide{border-color:#7C3AED!important;background:#F5F3FF!important}
  .placed-reg  {border-color:#0369A1!important;background:#EFF9FF!important}
  .placed-id   {border-color:#B45309!important;background:#FFFBEB!important}
  .placed-num {font-size:7.5pt!important;line-height:1.3!important}
  .placed-name{font-size:9pt!important;font-weight:900!important;line-height:1.3!important}
  .p-rm{display:none!important}

  /* Chip colours */
  .chip-no     {background:#F3F4F6!important;border:1pt dashed #CCC!important}
  .chip-morning{background:#EAF5FD!important}
  .chip-lunch  {background:#FFF8EF!important}
  .chip-both   {background:#F0FDF4!important}
  .subj-國語{background:#FEE2E2!important;color:#D92B2B!important}
  .subj-數學{background:#DBEAFE!important;color:#1D55D4!important}
  .subj-英語{background:#DCFCE7!important;color:#158A45!important}
  .subj-未定{background:#F3F4F6!important;color:#9CA3AF!important}
}
</style>
</head>
<body>

<header>
  <div class="app-logo">學生<span>排班</span></div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('篩選')" id="tab-篩選">篩選測驗</button>
    <button class="tab-btn" onclick="switchTab('成長')" id="tab-成長">成長測驗</button>
  </div>
  <div class="sync-badge">
    <div class="sync-dot" id="syncDot"></div>
    <span id="syncStatus">連線考試排程中…</span>
  </div>
  <div class="header-right">
    <a href="https://issac-sjps.github.io/Sjps-LearningAssistance/ExamSchedule.html" target="_blank" class="icon-btn" style="text-decoration:none">📋 考試排程</a>
    <button class="icon-btn" onclick="openRoster()">👤 管理名單</button>
    <button class="print-btn no-print" onclick="doPrint()">🖨 列印</button>
    <div class="save-badge">
      <div class="save-dot" id="saveDot"></div>
      <span id="saveStatus">載入中…</span>
    </div>
    <button class="icon-btn" id="editModeBtn" onclick="toggleEditMode()">🔒 瀏覽</button>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="s-title">待排學生</div>
    <input type="text" class="search-input" placeholder="搜尋姓名或班號…" id="poolSearch" oninput="renderPool()">
    <div id="cardPool"></div>
    <button class="reset-btn" onclick="doReset()">🗑 清除此測驗排班</button>
  </aside>

  <main class="main-content">
    <div class="perm-banner" id="permBanner">
      ⚠️ <strong>Firebase 權限不足（Missing or insufficient permissions）</strong><br>
      請前往 Firebase Console → Firestore → Rules，確認規則已開放 student_schedule 的讀寫。
    </div>
    <!-- scheduleArea 由 JS 動態產生，並在前面插入 print-page-header -->
    <div id="scheduleArea"></div>
  </main>
</div>

<!-- Roster Modal -->
<div class="modal-overlay" id="rosterModal">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">👤 學生名單管理</div>
      <button class="modal-close" onclick="closeRoster()">✕</button>
    </div>
    <div class="modal-body">
      <div class="add-row">
        <div class="field-group">
          <label class="field-label">班級座號（如 60501）</label>
          <input class="field-input" id="newNum" placeholder="60501" maxlength="10">
        </div>
        <div class="field-group">
          <label class="field-label">姓名</label>
          <input class="field-input" id="newName" placeholder="王曉明" onkeydown="if(event.key==='Enter')addStudent()">
        </div>
        <button class="add-btn" onclick="addStudent()">＋ 新增</button>
      </div>
      <input type="text" class="search-input" placeholder="搜尋名單…" id="rosterSearch" oninput="renderRosterList()">
      <div class="student-list" id="rosterList"></div>
    </div>
    <div class="modal-footer">
      <button class="add-btn" style="background:#6B7280" onclick="closeRoster()">關閉</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth }      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics.js";

const examConfig = {
  apiKey:"AIzaSyDqOkKvL3k-snAYDs17fLsc1I156_xS-QI",
  authDomain:"sjps-learningassistance.firebaseapp.com",
  projectId:"sjps-learningassistance",
  storageBucket:"sjps-learningassistance.firebasestorage.app",
  messagingSenderId:"108951710153",
  appId:"1:108951710153:web:434de73a24160fe3e2e018",
  measurementId:"G-EGQ7BLK57Y"
};
const studentConfig = {
  apiKey:"AIzaSyDqbYCxLjRSbEhrqNlTNl6GXx6a45LdFvQ",
  authDomain:"sjps-examschedule.firebaseapp.com",
  projectId:"sjps-examschedule",
  storageBucket:"sjps-examschedule.firebasestorage.app",
  messagingSenderId:"164163436928",
  appId:"1:164163436928:web:3764aa012e14dd5041c165",
  measurementId:"G-CDJR67KG0Q"
};
const examApp    = initializeApp(examConfig,    'exam-ref');
const studentApp = initializeApp(studentConfig, 'student-scheduler');
const examDb     = getFirestore(examApp);
const studentDb  = getFirestore(studentApp);
try{getAuth(studentApp);}catch(e){}
try{getAnalytics(studentApp);}catch(e){}

const EXAM_REF    = doc(examDb,    'schedule',        'main');
const STUDENT_REF = doc(studentDb, 'student_schedule','main');

// ─── Constants ───────────────────────────────────────────
const WDAYS=['一','二','三','四','五'];
const WNUM =['一','二','三','四'];
const WEEKS=4; const DAYS=5;
const ROLES=[
  {key:'guide',label:'引導人員',  color:'guide'},
  {key:'reg',  label:'報到人員',  color:'reg'  },
  {key:'id',   label:'發身分證條',color:'id'   },
];
const MAX_SLOTS=2;
const slotCount=n=>n>30?2:(n>0?1:0);
const SUBJ_PILL={
  '國語':'color:#D92B2B;border-color:#D92B2B;background:#FEF2F2',
  '數學':'color:#1D55D4;border-color:#1D55D4;background:#EFF6FF',
  '英語':'color:#158A45;border-color:#158A45;background:#F0FDF4',
  '未定':'color:#9CA3AF;border-color:#D1D5DB;background:#F3F4F6',
};

// ─── Exam reference data ─────────────────────────────────
let examData={startDate:'',counts:{},sched:{'篩選':{},'成長':{}},
  weekSubjs:{'篩選':['未定','未定','未定','未定'],'成長':['未定','未定','未定','未定']}};

// Parse subject from card id like '篩選-3-英' → '英語'
const SUBJ_CHAR_MAP={'國':'國語','數':'數學','英':'英語'};
function subjFromCardId(id){
  if(!id) return null;
  const char = id.split('-')[2];
  return SUBJ_CHAR_MAP[char] || null;
}
function subjFromSlots(mCard, lCard){
  const ms = mCard ? subjFromCardId(mCard.id) : null;
  const ls = lCard ? subjFromCardId(lCard.id) : null;
  if(ms && ls && ms !== ls) return ms + '/' + ls;
  return ms || ls || '未定';
}

function peopleFromCard(tt, cardObj){
  if(!cardObj) return 0;
  const parts = cardObj.id.split('-');
  const grade = parts[1], subj = parts[2];
  const key = grade + '-' + subj;
  const cnt = examData.counts;
  // New per-subject format: counts['篩選']['3-英']
  if(cnt && cnt[tt] && cnt[tt][key] !== undefined) return parseInt(cnt[tt][key]) || 0;
  // Old flat grade format: counts[grade]
  if(cnt && cnt[grade] !== undefined) return parseInt(cnt[grade]) || 0;
  return 0;
}
function peopleForDay(tt, mCard, lCard){
  const mp = peopleFromCard(tt, mCard);
  const lp = peopleFromCard(tt, lCard);
  if(mCard && lCard && mCard.id === lCard.id) return mp;
  return mp + lp;
}

function buildExamInfo(tt){
  const info={};const sc=examData.sched[tt]||{};
  for(let w=0;w<WEEKS;w++){
    for(let d=0;d<DAYS;d++){
      const mCard=sc[`${w}-${d}-morning`]||null;
      const lCard=sc[`${w}-${d}-lunch`]||null;
      const hM=!!mCard,hL=!!lCard;
      const has=hM||hL;
      let slot=null;
      if(hM&&hL)slot='both';else if(hM)slot='morning';else if(hL)slot='lunch';
      const subj=has?subjFromSlots(mCard,lCard):'未定';
      const people=has?peopleForDay(tt,mCard,lCard):0;
      info[`${w}-${d}`]={hasExam:has,slot,people,subj};
    }
  }
  return info;
}
function setSyncStatus(ok,msg){
  const dot=document.getElementById('syncDot'),lbl=document.getElementById('syncStatus');
  if(dot){dot.style.background=ok?'#34D399':'#FCA5A5';lbl.textContent=msg;}
}
onSnapshot(EXAM_REF,snap=>{
  if(snap.exists()){
    const d=snap.data();
    examData.startDate=d.startDate||'';
    examData.counts=d.counts||{};
    if(d.weekSubjs)for(const tt of['篩選','成長'])if(d.weekSubjs[tt])examData.weekSubjs[tt]=d.weekSubjs[tt];
    for(const tt of['篩選','成長'])examData.sched[tt]=d.sched?.[tt]||{};
    setSyncStatus(true,'已同步考試排程');
  }else setSyncStatus(false,'考試排程無資料');
  renderSchedule();
},err=>{console.error(err);setSyncStatus(false,'無法讀取考試排程');});

// ─── Student state ────────────────────────────────────────
let ST=mkDefault(),drag=null,saveTimer=null,isEditMode=false;
function mkDefault(){return{testType:'篩選',roster:[],sched:{'篩選':mkEmptySched(),'成長':mkEmptySched()}};}
function mkEmptySched(){
  const s={};
  for(let w=0;w<WEEKS;w++)for(let d=0;d<DAYS;d++)
    for(const r of ROLES)for(let i=0;i<MAX_SLOTS;i++)s[`${w}-${d}-${r.key}-${i}`]=null;
  return s;
}

// ─── Save / Load ──────────────────────────────────────────
function setStatus(c,t){const dot=document.getElementById('saveDot'),lbl=document.getElementById('saveStatus');if(dot){dot.style.background=c;lbl.textContent=t;}}
function showPermError(s){document.getElementById('permBanner').classList.toggle('show',s);}
function saveST(){
  clearTimeout(saveTimer);setStatus('#F59E0B','同步中...');
  saveTimer=setTimeout(async()=>{
    try{await setDoc(STUDENT_REF,ST);setStatus('#10B981','已同步');showPermError(false);}
    catch(e){
      console.error('Student write error:',e);
      if(e.code==='permission-denied'||e.message?.includes('permissions')){showPermError(true);setStatus('#EF4444','權限不足');}
      else setStatus('#EF4444','同步失敗');
    }
  },600);
}
async function loadST(){
  try{
    const snap=await getDoc(STUDENT_REF);
    if(snap.exists()){
      const d=snap.data();ST.testType=d.testType??ST.testType;ST.roster=d.roster??[];
      for(const tt of['篩選','成長'])if(d.sched?.[tt])ST.sched[tt]=Object.assign(mkEmptySched(),d.sched[tt]);
    }
    setStatus('#10B981','已載入');showPermError(false);
  }catch(e){
    console.error('Student read error:',e);
    if(e.code==='permission-denied'||e.message?.includes('permissions')){showPermError(true);setStatus('#EF4444','權限不足');}
    else setStatus('#EF4444','載入失敗');
  }
  renderAll();
}

// ─── Roster ───────────────────────────────────────────────
window.openRoster=()=>{document.getElementById('rosterModal').classList.add('open');renderRosterList();};
window.closeRoster=()=>{document.getElementById('rosterModal').classList.remove('open');renderPool();renderSchedule();};
window.addStudent=()=>{
  const num=document.getElementById('newNum').value.trim();
  const name=document.getElementById('newName').value.trim();
  if(!num||!name){alert('請填寫班級座號與姓名');return;}
  if(ST.roster.find(s=>s.num===num)){alert('此班級座號已存在');return;}
  ST.roster.push({id:num+'_'+Date.now(),num,name});
  ST.roster.sort((a,b)=>a.num.localeCompare(b.num,'zh-TW',{numeric:true}));
  document.getElementById('newNum').value='';document.getElementById('newName').value='';
  saveST();renderRosterList();
};
window.deleteStudent=id=>{
  if(!confirm('確定刪除此學生？'))return;
  ST.roster=ST.roster.filter(s=>s.id!==id);
  for(const tt of['篩選','成長'])for(const k of Object.keys(ST.sched[tt]))if(ST.sched[tt][k]===id)ST.sched[tt][k]=null;
  saveST();renderRosterList();
};
window.renderRosterList=()=>{
  const q=(document.getElementById('rosterSearch')?.value||'').toLowerCase();
  const el=document.getElementById('rosterList');
  const list=ST.roster.filter(s=>s.num.includes(q)||s.name.toLowerCase().includes(q));
  if(!list.length){el.innerHTML='<div style="text-align:center;color:#94A3B8;padding:16px;font-size:13px">尚無學生或無符合結果</div>';return;}
  el.innerHTML=list.map(s=>`<div class="student-item"><span class="stu-num">${s.num}</span><span class="stu-name">${s.name}</span><button class="stu-del" onclick="deleteStudent('${s.id}')">✕ 刪除</button></div>`).join('');
};

// ─── Pool ─────────────────────────────────────────────────
function placedIds(){const ids=new Set();for(const v of Object.values(ST.sched[ST.testType]))if(v)ids.add(v);return ids;}
function poolStudents(){
  const placed=placedIds();const q=(document.getElementById('poolSearch')?.value||'').toLowerCase();
  return ST.roster.filter(s=>!placed.has(s.id)&&(s.num.includes(q)||s.name.toLowerCase().includes(q)));
}
function renderPool(){
  const el=document.getElementById('cardPool');if(!el)return;
  const cards=poolStudents();
  if(!cards.length){el.innerHTML='<div class="pool-empty">✓ 所有學生已排入<br>或名單為空</div>';return;}
  el.innerHTML=cards.map(s=>`<div class="pool-card" data-id="${s.id}" draggable="true" ondragstart="onDragStart(event,'${s.id}','pool')" ondragend="this.classList.remove('dragging')"><span class="pc-num">${s.num}</span><span class="pc-name">${s.name}</span></div>`).join('');
}

// ─── Dates ────────────────────────────────────────────────
function weekDates(wi){
  const sd=examData.startDate||'';if(!sd)return Array(5).fill(null);
  const base=new Date(sd+'T00:00:00');const dow=base.getDay();
  base.setDate(base.getDate()+(dow===0?-6:1-dow)+wi*7);
  return Array.from({length:5},(_,i)=>{const d=new Date(base);d.setDate(base.getDate()+i);return d;});
}
function fmt(d){return d?`${d.getMonth()+1}/${d.getDate()}`:'—';}
function fmtFull(d){return d?`${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`:'—';}

// ─── Render ───────────────────────────────────────────────
function renderAll(){
  document.getElementById('tab-篩選').className='tab-btn'+(ST.testType==='篩選'?' active':'');
  document.getElementById('tab-成長').className='tab-btn'+(ST.testType==='成長'?' active':'');
  renderPool();renderSchedule();
}

function weekTableHTML(w, sc, ei, ws){
  const dates=weekDates(w);
  const subj=ws[w]||'未定';
  const ps=SUBJ_PILL[subj]||SUBJ_PILL['未定'];

  // header row
  const headerCells=dates.map((d,di)=>{
    const info=ei[`${w}-${di}`]||{};
    const slots=slotCount(info.people||0);
    const slotLabel=info.slot==='both'?'早自修＋午休':info.slot==='morning'?'早自修':info.slot==='lunch'?'午休時間':'';
    const chipCls={'morning':'chip-morning','lunch':'chip-lunch','both':'chip-both'}[info.slot]||'chip-no';
    const sj=info.subj||'未定';
    return `<th class="th-day">
      <div class="th-date">${fmt(d)}</div>
      <div class="th-dow">${d?'（'+WDAYS[di]+'）':''}</div>
      <div class="chip-wrap">
        ${info.hasExam
          ?`<div class="exam-chip ${chipCls}">📋 ${slotLabel}<span class="subj-${sj} subj-inline">${sj}</span></div>
            <div style="font-size:8px;color:#9CA3AF;font-family:'JetBrains Mono',monospace">${info.people}人 → 各${slots}位</div>`
          :`<div class="exam-chip chip-no">無考試</div>`}
      </div>
    </th>`;
  }).join('');

  // role rows
  let roleRows='';
  for(const role of ROLES){
    for(let si=0;si<MAX_SLOTS;si++){
      roleRows+=`<tr><td class="rl rl-${role.color}">${role.label}<br><span style="font-size:8px;font-family:'JetBrains Mono',monospace;opacity:.5">#${si+1}</span></td>`;
      for(let d=0;d<DAYS;d++){
        const info=ei[`${w}-${d}`]||{hasExam:false,people:0};
        const slots=slotCount(info.people||0);
        const active=info.hasExam&&si<slots;
        const key=`${w}-${d}-${role.key}-${si}`;
        const sid=sc[key];const stu=sid?ST.roster.find(s=>s.id===sid):null;
        if(!active){
          roleRows+=`<td class="dc dc-inactive"><div style="height:48px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#D1D5DB">—</div></td>`;
        }else{
          roleRows+=`<td class="dc dc-${role.color}" data-key="${key}" ondragover="ev_over(event)" ondrop="ev_drop(event,'${key}')" ondragenter="this.classList.add('over')" ondragleave="this.classList.remove('over')">
            ${stu
              ?`<div class="placed placed-${role.color}" data-id="${stu.id}" draggable="true" ondragstart="onDragStart(event,'${stu.id}','placed')" ondragend="this.classList.remove('dragging')"><span class="p-rm" onclick="removeCard('${key}')">✕</span><div class="placed-num">${stu.num}</div><div class="placed-name">${stu.name}</div></div>`
              :'<div class="drop-empty">拖放此處</div>'}
          </td>`;
        }
      }
      roleRows+='</tr>';
    }
  }

  return `<div class="week-block">
    <div class="week-head">
      <div class="week-label">第${WNUM[w]}週</div>
      <div class="week-subj-pill" style="${ps}">${subj==='未定'?'未定':'考'+subj}</div>
    </div>
    <table class="sch">
      <colgroup><col style="width:56px">${Array(DAYS).fill('<col>').join('')}</colgroup>
      <thead><tr><th class="th-corner">職位</th>${headerCells}</tr></thead>
      <tbody>${roleRows}</tbody>
    </table>
  </div>`;
}

function renderSchedule(){
  const area=document.getElementById('scheduleArea');if(!area)return;
  const sc=ST.sched[ST.testType];
  const ei=buildExamInfo(ST.testType);
  const ws=examData.weekSubjs[ST.testType]||['未定','未定','未定','未定'];
  const tt=ST.testType;
  const today=new Date();
  const dateStr=`${today.getFullYear()}/${today.getMonth()+1}/${today.getDate()}`;

  // Page 1: weeks 0,1  |  Page 2: weeks 2,3
  // Each page has a print-page-header
  const page1header=`<div class="print-page-header">
    <div><div class="pph-title">學生<span>排班</span>表</div><div class="pph-sub">列印日期：${dateStr}</div></div>
    <div class="pph-type">${tt}測驗 ・ 第一週 ～ 第二週</div>
  </div>`;
  const page2header=`<div class="print-page-header">
    <div><div class="pph-title">學生<span>排班</span>表</div><div class="pph-sub">列印日期：${dateStr}</div></div>
    <div class="pph-type">${tt}測驗 ・ 第三週 ～ 第四週</div>
  </div>`;

  area.innerHTML=
    page1header +
    weekTableHTML(0,sc,ei,ws) +
    weekTableHTML(1,sc,ei,ws) +
    page2header +
    weekTableHTML(2,sc,ei,ws) +
    weekTableHTML(3,sc,ei,ws);
}

// ─── Print ────────────────────────────────────────────────
window.doPrint=()=>{ window.print(); };

// ─── Handlers ─────────────────────────────────────────────
window.switchTab=tt=>{ST.testType=tt;saveST();renderAll();};
window.doReset=()=>{
  if(!confirm(`確定清除「${ST.testType}測驗」的全部排班？`))return;
  ST.sched[ST.testType]=mkEmptySched();saveST();renderPool();renderSchedule();
};
window.toggleEditMode=()=>{
  if(isEditMode){
    isEditMode=false;document.body.classList.remove('edit-mode');
    document.getElementById('editModeBtn').textContent='🔒 瀏覽';
    document.getElementById('editModeBtn').classList.remove('unlocked');
    renderSchedule();
  }else{
    const pw=prompt('請輸入編輯密碼：');
    if(pw==='admin'){
      isEditMode=true;document.body.classList.add('edit-mode');
      document.getElementById('editModeBtn').textContent='🔓 編輯';
      document.getElementById('editModeBtn').classList.add('unlocked');
      renderSchedule();
    }else if(pw!==null)alert('密碼錯誤');
  }
};
window.onDragStart=(ev,id,src)=>{
  if(!isEditMode){ev.preventDefault();return;}
  drag={id,src};ev.dataTransfer.effectAllowed='move';
  setTimeout(()=>{const el=document.querySelector(`[data-id="${id}"]`);if(el)el.classList.add('dragging');},0);
};
window.ev_over=ev=>{ev.preventDefault();ev.dataTransfer.dropEffect='move';};
window.ev_drop=(ev,targetKey)=>{
  ev.preventDefault();ev.currentTarget.classList.remove('over');
  if(!drag||!isEditMode)return;
  const sc=ST.sched[ST.testType];const existing=sc[targetKey];
  if(drag.src==='pool'){sc[targetKey]=drag.id;}
  else{const srcKey=Object.keys(sc).find(k=>sc[k]===drag.id);if(srcKey){sc[srcKey]=existing||null;sc[targetKey]=drag.id;}}
  drag=null;saveST();renderPool();renderSchedule();
};
window.removeCard=key=>{ST.sched[ST.testType][key]=null;saveST();renderPool();renderSchedule();};

loadST();
</script>
