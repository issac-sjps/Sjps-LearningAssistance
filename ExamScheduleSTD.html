<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>學生排班系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F2EFE9;--surface:#FFF;--border:#DDD8D0;
  --text:#1C1917;--text-muted:#78716C;
  --guide:#7C3AED;--reg:#0369A1;--id:#B45309;
  --shadow:0 1px 3px rgba(0,0,0,.09),0 1px 2px rgba(0,0,0,.06);
  --shadow-md:0 4px 8px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.05);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

header{background:#1C1917;color:#FFF;padding:0 16px;height:48px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:200}
.app-logo{font-size:19px;font-weight:900;letter-spacing:-.5px;white-space:nowrap}
.app-logo span{color:#F59E0B}
.tabs{display:flex;gap:3px;background:rgba(255,255,255,.12);padding:3px;border-radius:7px;flex-shrink:0}
.tab-btn{padding:4px 15px;border-radius:5px;border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;transition:all .2s;background:transparent;color:rgba(255,255,255,.6)}
.tab-btn.active{background:#FFF;color:#1C1917}
.sync-badge{display:flex;align-items:center;gap:5px;font-size:10px;color:rgba(255,255,255,.5);white-space:nowrap;flex-shrink:0;background:rgba(255,255,255,.07);padding:3px 9px;border-radius:5px}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#6EE7B7;flex-shrink:0;transition:background .3s}
.header-right{margin-left:auto;display:flex;align-items:center;gap:7px;flex-shrink:0}
.save-badge{font-size:11px;color:rgba(255,255,255,.5);display:flex;align-items:center;gap:4px;white-space:nowrap}
.save-dot{width:6px;height:6px;border-radius:50%;background:#10B981;transition:background .3s}
.icon-btn{padding:4px 12px;border-radius:6px;border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.08);color:rgba(255,255,255,.72);font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap;text-decoration:none;display:inline-flex;align-items:center}
.icon-btn:hover{background:rgba(255,255,255,.18);color:#FFF}
.icon-btn.unlocked{background:#D97706;border-color:#F59E0B;color:#FFF}
.print-btn{padding:4px 12px;border-radius:6px;border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.08);color:rgba(255,255,255,.72);font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap}
.print-btn:hover{background:#059669;border-color:#34D399;color:#FFF}

.layout{display:flex;align-items:flex-start}
.sidebar{width:206px;min-width:206px;background:var(--surface);border-right:1px solid var(--border);min-height:calc(100vh - 48px);padding:14px 12px;position:sticky;top:48px;overflow-y:auto;max-height:calc(100vh - 48px);display:none;flex-direction:column}
body.edit-mode .sidebar{display:flex}
.s-title{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.s-title::after{content:'';flex:1;height:1px;background:var(--border)}
.search-input{width:100%;padding:6px 9px;border:1px solid var(--border);border-radius:6px;font-family:inherit;font-size:12px;background:var(--bg);margin-bottom:8px}
.search-input:focus{outline:none;border-color:#94A3B8;background:#FFF}
.pool-card{display:flex;flex-direction:column;gap:1px;padding:6px 8px;border-radius:6px;cursor:grab;border:1.5px solid #DDD8D0;background:#FFF;transition:transform .15s,box-shadow .15s;user-select:none;margin-bottom:3px}
.pool-card:hover{transform:translateY(-1px);box-shadow:var(--shadow-md)}
.pool-card.dragging{opacity:.3;cursor:grabbing}
.pc-num{font-size:12px;font-weight:800;color:var(--text);font-family:'JetBrains Mono',monospace}
.pc-name{font-size:11px;color:var(--text-muted);font-weight:600}
.pool-empty{font-size:11px;color:#94A3B8;text-align:center;padding:12px;background:#F8FAFC;border-radius:6px;line-height:1.6}
.reset-btn{width:100%;padding:7px;border:1px solid var(--border);margin-top:auto;background:var(--bg);border-radius:6px;cursor:pointer;font-family:inherit;font-size:12px;color:var(--text-muted);transition:all .15s}
.reset-btn:hover{border-color:#EF4444;color:#EF4444;background:#FEF2F2}

.main-content{flex:1;padding:10px 14px;overflow-x:auto;min-width:0}

/* Week */
.week-block{margin-bottom:14px}
.week-head{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.week-label{font-size:13px;font-weight:900;color:var(--text)}
.week-subj-pill{font-size:10px;padding:2px 9px;border-radius:20px;font-weight:700;border:1.5px solid}

table.sch{border-collapse:collapse;background:var(--surface);border-radius:8px;overflow:hidden;box-shadow:var(--shadow);width:100%;table-layout:auto}
table.sch th,table.sch td{border:1px solid var(--border)}

/* Corner & day header */
.th-corner{background:#292524;color:#FFF;font-size:11px;font-weight:700;padding:5px 7px;text-align:left;vertical-align:middle;white-space:nowrap}
/* Day group header spans 2 sub-cols */
.th-day-group{text-align:center;padding:4px 3px;background:#FAFAF8;vertical-align:top}
.th-date{font-weight:700;font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--text)}
.th-dow{font-size:9px;color:var(--text-muted);margin:1px 0 2px}
/* Sub-column header: 早 / 午 */
.th-sub{text-align:center;padding:3px 2px;font-size:9px;font-weight:700;vertical-align:top}
.th-sub-morning{background:#EAF5FD;color:#0369A1}
.th-sub-lunch{background:#FFF8EF;color:#B45309}
.th-sub-none{background:#F3F4F6;color:#C4C4C4}

/* Exam chip inside sub-header */
.sub-chip{display:inline-flex;align-items:center;gap:2px;padding:1px 4px;border-radius:3px;font-size:8px;font-weight:700;margin-top:2px;white-space:nowrap}
.sub-chip-no{background:#F3F4F6;color:#C4C4C4;border:1px dashed #DDD}
.sub-chip-has{background:rgba(0,0,0,.05)}
.subj-國語{background:#FEE2E2;color:#D92B2B}
.subj-數學{background:#DBEAFE;color:#1D55D4}
.subj-英語{background:#DCFCE7;color:#158A45}
.subj-未定{background:#F3F4F6;color:#9CA3AF}
.subj-inline{display:inline-block;padding:0 4px;border-radius:2px;font-size:8px;font-weight:800}

/* Role label */
.rl{font-size:9px;font-weight:700;padding:4px 3px;vertical-align:middle;word-break:keep-all;width:52px;line-height:1.4;text-align:center}
.rl-guide{background:#F3E8FF;color:var(--guide)}
.rl-reg{background:#E0F2FE;color:var(--reg)}
.rl-id{background:#FEF3C7;color:var(--id)}

/* Drop cells */
.dc{vertical-align:middle;padding:3px;transition:background .15s;width:80px;min-width:70px}
.dc-morning-guide{background:#F9F5FF}
.dc-morning-reg  {background:#F0F8FF}
.dc-morning-id   {background:#FFFCF0}
.dc-lunch-guide  {background:#F3E8FF55}
.dc-lunch-reg    {background:#E0F2FE55}
.dc-lunch-id     {background:#FEF3C755}
.dc.over{background:#BFDBFE !important;outline:2px dashed #3B82F6;outline-offset:-2px}
.dc-inactive{background:#F5F5F5;opacity:.22}

.drop-empty{height:44px;display:flex;align-items:center;justify-content:center;color:#D1D5DB;font-size:9px;border:1.5px dashed #E5E7EB;border-radius:4px}
.dc.over .drop-empty{border-color:#93C5FD;color:#93C5FD}

.placed{border-radius:4px;padding:3px 6px;border:1.5px solid;cursor:grab;user-select:none;position:relative;min-height:44px;display:flex;flex-direction:column;justify-content:center;gap:1px}
.placed.dragging{opacity:.3}
.placed-guide{border-color:var(--guide);background:#F5F3FF}
.placed-reg  {border-color:var(--reg);background:#EFF9FF}
.placed-id   {border-color:var(--id);background:#FFFBEB}
.placed-num{font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--text)}
.placed-name{font-size:11px;font-weight:800;color:var(--text)}
.p-rm{position:absolute;top:2px;right:2px;cursor:pointer;font-size:9px;color:#D1D5DB;padding:1px 2px;border-radius:2px}
.p-rm:hover{color:#EF4444;background:#FEE2E2}

body:not(.edit-mode) .pool-card,
body:not(.edit-mode) .placed{cursor:default;pointer-events:none}
body:not(.edit-mode) .p-rm{display:none}
body:not(.edit-mode) .drop-empty{pointer-events:none}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.45);backdrop-filter:blur(2px);align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#FFF;border-radius:12px;width:540px;max-height:82vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.2);overflow:hidden}
.modal-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:16px;font-weight:800}
.modal-close{background:none;border:none;cursor:pointer;font-size:18px;color:var(--text-muted);padding:2px 7px;border-radius:4px}
.modal-close:hover{background:var(--bg)}
.modal-body{padding:16px 20px;overflow-y:auto;flex:1}
.modal-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.add-row{display:flex;gap:8px;margin-bottom:14px;align-items:flex-end}
.field-group{display:flex;flex-direction:column;gap:3px;flex:1}
.field-label{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em}
.field-input{padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-family:inherit;font-size:13px;background:var(--bg)}
.field-input:focus{outline:none;border-color:#94A3B8;background:#FFF}
.add-btn{padding:7px 16px;background:#1C1917;color:#FFF;border:none;border-radius:6px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;white-space:nowrap}
.add-btn:hover{background:#292524}
.student-list{display:flex;flex-direction:column;gap:3px}
.student-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border:1px solid var(--border);border-radius:6px;background:var(--bg)}
.stu-num{font-size:12px;font-weight:700;font-family:'JetBrains Mono',monospace;min-width:64px}
.stu-name{font-size:13px;font-weight:600;flex:1}
.stu-del{background:none;border:none;cursor:pointer;color:#D1D5DB;font-size:12px;padding:2px 7px;border-radius:4px}
.stu-del:hover{color:#EF4444;background:#FEF2F2}

.perm-banner{display:none;margin:8px 0;padding:10px 14px;background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;font-size:12px;color:#991B1B;line-height:1.6}
.perm-banner.show{display:block}

/* Print */
.print-page-header{display:none}

/* Notice print */
.notice-overlay{display:none;position:fixed;inset:0;z-index:600;background:#FFF;overflow-y:auto}
.notice-overlay.open{display:block}
.notice-toolbar{position:sticky;top:0;background:#1C1917;color:#FFF;padding:10px 20px;display:flex;align-items:center;gap:12px;z-index:10}
.notice-toolbar-title{font-size:14px;font-weight:800}
.notice-close-btn{margin-left:auto;padding:5px 14px;border-radius:6px;border:1px solid rgba(255,255,255,.3);background:transparent;color:#FFF;cursor:pointer;font-family:inherit;font-size:12px;font-weight:700}
.notice-print-btn{padding:5px 14px;border-radius:6px;border:none;background:#059669;color:#FFF;cursor:pointer;font-family:inherit;font-size:12px;font-weight:700}
.notice-pages{padding:20px;display:flex;flex-direction:column;gap:24px;align-items:center}
.notice-card{
  width:190mm;background:#FFF;border:1px solid #DDD;border-radius:8px;
  padding:14mm 16mm;font-family:'Noto Sans TC',sans-serif;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}
.nc-school{font-size:11pt;color:#555;text-align:center;margin-bottom:2pt}
.nc-title{font-size:17pt;font-weight:900;text-align:center;margin-bottom:10pt;letter-spacing:.5pt}
.nc-divider{border:none;border-top:2pt solid #1C1917;margin:0 0 10pt}
.nc-student-row{display:flex;align-items:baseline;gap:16pt;margin-bottom:10pt}
.nc-label{font-size:9pt;color:#888;white-space:nowrap}
.nc-num{font-size:16pt;font-weight:900;font-family:'JetBrains Mono',monospace;color:#1C1917}
.nc-name{font-size:20pt;font-weight:900;color:#1C1917}
.nc-note{font-size:9pt;color:#888;margin-bottom:8pt;line-height:1.6}
.nc-table{width:100%;border-collapse:collapse;font-size:10pt}
.nc-table th{background:#1C1917;color:#FFF;padding:5pt 8pt;text-align:left;font-size:9pt;font-weight:700}
.nc-table td{padding:5pt 8pt;border-bottom:1pt solid #EEE;vertical-align:middle}
.nc-table tr:last-child td{border-bottom:none}
.nc-table tr:nth-child(even) td{background:#F8F8F8}
.nc-seq{font-family:'JetBrains Mono',monospace;font-size:9pt;color:#888;text-align:center;width:24pt}
.nc-date{font-family:'JetBrains Mono',monospace;font-weight:700;white-space:nowrap}
.nc-time{color:#555;white-space:nowrap;font-size:9pt}
.nc-subj{}
.nc-role-guide{color:#7C3AED;font-weight:700}
.nc-role-reg  {color:#0369A1;font-weight:700}
.nc-role-id   {color:#B45309;font-weight:700}
.nc-footer{margin-top:10pt;font-size:8.5pt;color:#888;text-align:center}
.nc-sign{display:flex;justify-content:flex-end;margin-top:12pt;gap:32pt}
.nc-sign-item{text-align:center;font-size:9pt;color:#555}
.nc-sign-line{width:60pt;border-bottom:1pt solid #999;margin:0 auto 3pt}
@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  /* When printing notices, hide everything except notice overlay */
  body.printing-notice header,
  body.printing-notice .layout,
  body.printing-notice .perm-banner{display:none!important}
  body.printing-notice .notice-overlay{position:static!important;display:block!important}
  body.printing-notice .notice-toolbar{display:none!important}
  body.printing-notice .notice-pages{padding:0!important;gap:0!important;display:block!important}
  body.printing-notice .notice-card{
    box-shadow:none!important;border:none!important;border-radius:0!important;
    page-break-after:always;break-after:page;
    width:auto!important;margin:0!important;
  }
  body.printing-notice .notice-card:last-child{page-break-after:avoid;break-after:avoid}
  /* Normal schedule print: hide notice */
  body:not(.printing-notice) .notice-overlay{display:none!important}
  @page{size:A4 landscape;margin:8mm 7mm}
  header,.sidebar,.perm-banner,.no-print,.pool-card,.pool-empty,.reset-btn,.search-input,.s-title,.p-rm{display:none!important}
  body{background:#FFF!important}
  .layout{display:block!important}
  .main-content{padding:0!important;overflow:visible!important}
  .week-block:nth-child(2){margin-bottom:0;page-break-after:always}
  .week-block{break-inside:avoid;margin-bottom:5pt}
  .print-page-header{display:flex!important;align-items:baseline;justify-content:space-between;padding-bottom:4pt;margin-bottom:5pt;border-bottom:2pt solid #1C1917}
  .pph-title{font-size:13pt;font-weight:900}.pph-title span{color:#D97706}
  .pph-sub{font-size:8pt;color:#555}
  .pph-type{font-size:8pt;font-weight:700;padding:1pt 6pt;border-radius:3pt;background:#F3F4F6;border:1pt solid #CCC}
  .week-head{margin-bottom:3pt!important}
  .week-label{font-size:10pt!important;font-weight:900!important}
  .week-subj-pill{font-size:7pt!important;padding:1pt 5pt!important}
  table.sch{border-collapse:collapse!important;box-shadow:none!important;border-radius:0!important;border:1.5pt solid #666!important;width:100%!important}
  table.sch th,table.sch td{border:1pt solid #AAA!important}
  .th-corner{background:#1C1917!important;color:#FFF!important;font-size:7pt!important;padding:3pt 4pt!important}
  .th-day-group{background:#F0F0EE!important;padding:2pt!important}
  .th-date{font-size:8pt!important}
  .th-dow{font-size:6pt!important;margin:0!important}
  .th-sub{font-size:7pt!important;padding:2pt 1pt!important}
  .th-sub-morning{background:#EAF5FD!important}
  .th-sub-lunch{background:#FFF8EF!important}
  .th-sub-none{background:#F3F4F6!important}
  .sub-chip{font-size:6pt!important;padding:0 3pt!important}
  .rl{font-size:7pt!important;width:36pt!important;padding:2pt!important}
  .rl-guide{background:#F3E8FF!important;color:#7C3AED!important}
  .rl-reg  {background:#E0F2FE!important;color:#0369A1!important}
  .rl-id   {background:#FEF3C7!important;color:#B45309!important}
  .dc{padding:2pt!important}
  .dc-inactive{opacity:.2!important;background:#F5F5F5!important}
  .drop-empty{height:26pt!important;border:1pt dashed #CCC!important;font-size:0!important;color:transparent!important;background:#FAFAFA!important}
  .placed{min-height:26pt!important;border-width:1pt!important;padding:2pt 4pt!important;border-radius:2pt!important;gap:0!important}
  .placed-guide{border-color:#7C3AED!important;background:#F5F3FF!important}
  .placed-reg  {border-color:#0369A1!important;background:#EFF9FF!important}
  .placed-id   {border-color:#B45309!important;background:#FFFBEB!important}
  .placed-num{font-size:7pt!important}.placed-name{font-size:8.5pt!important;font-weight:900!important}
  .p-rm{display:none!important}
  .subj-國語{background:#FEE2E2!important;color:#D92B2B!important}
  .subj-數學{background:#DBEAFE!important;color:#1D55D4!important}
  .subj-英語{background:#DCFCE7!important;color:#158A45!important}
}
</style>
</head>
<body>

<header>
  <div class="app-logo">學生<span>排班</span></div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('篩選')" id="tab-篩選">篩選測驗</button>
    <button class="tab-btn" onclick="switchTab('成長')" id="tab-成長">成長測驗</button>
  </div>
  <div class="sync-badge">
    <div class="sync-dot" id="syncDot"></div>
    <span id="syncStatus">連線考試排程中…</span>
  </div>
  <div class="header-right">
    <a href="https://issac-sjps.github.io/Sjps-LearningAssistance/ExamSchedule.html" target="_blank" class="icon-btn">📋 考試排程</a>
    <button class="icon-btn" onclick="openRoster()">👤 管理名單</button>
    <button class="print-btn no-print" onclick="doPrint()">🖨 排班表</button>
    <button class="print-btn no-print" onclick="openNotice()" style="background:rgba(124,58,237,.15);border-color:rgba(124,58,237,.4);color:#C4B5FD">📄 通知單</button>
    <div class="save-badge">
      <div class="save-dot" id="saveDot"></div>
      <span id="saveStatus">載入中…</span>
    </div>
    <button class="icon-btn" id="editModeBtn" onclick="toggleEditMode()">🔒 瀏覽</button>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="s-title">待排學生</div>
    <input type="text" class="search-input" placeholder="搜尋姓名或班號…" id="poolSearch" oninput="renderPool()">
    <div id="cardPool"></div>
    <button class="reset-btn" onclick="doReset()">🗑 清除此測驗排班</button>
  </aside>
  <main class="main-content">
    <div class="perm-banner" id="permBanner">
      ⚠️ <strong>Firebase 權限不足</strong> — 請確認 Firestore Rules 已開放 student_schedule 讀寫。
    </div>
    <div id="scheduleArea"></div>
  </main>
</div>

<div class="modal-overlay" id="rosterModal">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">👤 學生名單管理</div>
      <button class="modal-close" onclick="closeRoster()">✕</button>
    </div>
    <div class="modal-body">
      <div id="rosterAddRow" class="add-row">
        <div class="field-group">
          <label class="field-label">班級座號（如 60501）</label>
          <input class="field-input" id="newNum" placeholder="60501" maxlength="10">
        </div>
        <div class="field-group">
          <label class="field-label">姓名</label>
          <input class="field-input" id="newName" placeholder="王曉明" onkeydown="if(event.key==='Enter')addStudent()">
        </div>
        <button class="add-btn" onclick="addStudent()">＋ 新增</button>
      </div>
      <div id="rosterLockNote" style="display:none;padding:8px 12px;background:#FEF9EE;border:1px solid #FDE68A;border-radius:6px;font-size:12px;color:#92400E;margin-bottom:12px">
        🔒 請進入<strong>編輯模式</strong>後才能新增或刪除學生。
      </div>
      <input type="text" class="search-input" placeholder="搜尋名單…" id="rosterSearch" oninput="renderRosterList()">
      <div class="student-list" id="rosterList"></div>
    </div>
    <div class="modal-footer">
      <button class="add-btn" style="background:#6B7280" onclick="closeRoster()">關閉</button>

// ─── Constants ───────────────────────────────────────────
const WDAYS=['一','二','三','四','五'];

// ≤0 → 0 slots (no exam), 1-30 → 1 slot, >30 → 2 slots
const slotCount=n=>n>30?2:(n>0?1:0);
const SUBJ_PILL={

  '數學':'color:#1D55D4;border-color:#1D55D4;background:#EFF6FF',

  '未定':'color:#9CA3AF;border-color:#D1D5DB;background:#F3F4F6',
};
const SUBJ_CHAR={'國':'國語','數':'數學','英':'英語'};
const GRADE_NAMES=['','一','二','三','四','五','六'];
function gradeFromId(id){ if(!id)return''; const g=parseInt(id.split('-')[1]); return GRADE_NAMES[g]||''; }

// ─── Exam data (read-only from schedule/main) ────────────
let examData={startDate:'',counts:{},sched:{'篩選':{},'成長':{}}};

function subjFromId(id){
  if(!id)return null;
  return SUBJ_CHAR[id.split('-')[2]]||null;
}
function peopleFromCard(tt,cardObj){
  if(!cardObj)return 0;
  const parts=cardObj.id.split('-');
  const key=parts[1]+'-'+parts[2];
  const cnt=examData.counts;
  if(cnt&&cnt[tt]&&cnt[tt][key]!==undefined)return parseInt(cnt[tt][key])||0;
  if(cnt&&cnt[parts[1]]!==undefined)return parseInt(cnt[parts[1]])||0;
  return 0;
}

// Per-slot info: {hasExam, people, subj}
function slotInfo(tt,w,d,slot){
  const sc=examData.sched[tt]||{};
  const card=sc[`${w}-${d}-${slot}`]||null;
  if(!card)return{hasExam:false,people:0,subj:'未定',grade:''};
  return{hasExam:true,people:peopleFromCard(tt,card),subj:subjFromId(card.id)||'未定',grade:gradeFromId(card.id)};
}

function setSyncStatus(ok,msg){

onSnapshot(EXAM_REF,snap=>{

},err=>{console.error(err);setSyncStatus(false,'無法讀取考試排程');});

// ─── Student state ────────────────────────────────────────
// Key format: `${w}-${d}-${slot}-${role}-${si}`
// slot = 'morning' | 'lunch'
let ST=mkDefault(),drag=null,saveTimer=null,isEditMode=false;
function mkDefault(){return{testType:'篩選',roster:[],sched:{'篩選':mkEmptySched(),'成長':mkEmptySched()}};}
function mkEmptySched(){
  const s={};
  for(let w=0;w<WEEKS;w++)for(let d=0;d<DAYS;d++)
    for(const slot of SLOTS)for(const r of ROLES)for(let i=0;i<MAX_SLOTS_PER_ROLE;i++)
      s[`${w}-${d}-${slot}-${r.key}-${i}`]=null;
  return s;
}

// ─── Save / Load ──────────────────────────────────────────
function setStatus(c,t){const dot=document.getElementById('saveDot'),lbl=document.getElementById('saveStatus');if(dot){dot.style.background=c;lbl.textContent=t;}}
function showPermError(s){document.getElementById('permBanner').classList.toggle('show',s);}
function saveST(){
  clearTimeout(saveTimer);setStatus('#F59E0B','同步中...');
  saveTimer=setTimeout(async()=>{
    try{await setDoc(STUDENT_REF,ST);setStatus('#10B981','已同步');showPermError(false);}
    catch(e){
      console.error(e);
      if(e.code==='permission-denied'||e.message?.includes('permissions')){showPermError(true);setStatus('#EF4444','權限不足');}

}
async function loadST(){

// Class colour palette — cycle through these for distinct classes
const CLASS_COLORS=[
  '#D92B2B','#1D55D4','#158A45','#B45309','#7C3AED',
  '#0369A1','#BE185D','#0F766E','#B45309','#6D28D9',
  '#047857','#1D4ED8','#9D174D','#0E7490','#C2410C',
];
const classColorMap={};
let classColorIdx=0;
function classColor(num){
  const cls=num.length>=3?num.slice(0,3):num.slice(0,2);
  if(!classColorMap[cls]){
    classColorMap[cls]=CLASS_COLORS[classColorIdx%CLASS_COLORS.length];
    classColorIdx++;
  }
  return classColorMap[cls];
}
// Build colour map from current roster (sorted) so colours are stable
function rebuildClassColors(){
  // Reset
  for(const k of Object.keys(classColorMap))delete classColorMap[k];
  classColorIdx=0;
  // Go through roster sorted to assign colours in order
  const classes=[...new Set(ST.roster.map(s=>s.num.length>=3?s.num.slice(0,3):s.num.slice(0,2)))].sort();
  classes.forEach((cls,i)=>{classColorMap[cls]=CLASS_COLORS[i%CLASS_COLORS.length];});
}

window.renderRosterList=()=>{
  rebuildClassColors();
  const q=(document.getElementById('rosterSearch')?.value||'').toLowerCase();
  const el=document.getElementById('rosterList');

};

// ─── Dates ────────────────────────────────────────────────
function weekDates(wi){
  const sd=examData.startDate||'';if(!sd)return Array(5).fill(null);
  const base=new Date(sd+'T00:00:00');const dow=base.getDay();
  base.setDate(base.getDate()+(dow===0?-6:1-dow)+wi*7);
  return Array.from({length:5},(_,i)=>{const d=new Date(base);d.setDate(base.getDate()+i);return d;});
}
function fmt(d){return d?`${d.getMonth()+1}/${d.getDate()}`:'—';}

// ─── Render ───────────────────────────────────────────────
function renderAll(){
  document.getElementById('tab-篩選').className='tab-btn'+(ST.testType==='篩選'?' active':'');
  document.getElementById('tab-成長').className='tab-btn'+(ST.testType==='成長'?' active':'');
  renderPool();renderSchedule();
}

function weekTableHTML(w,sc,ws){
  const dates=weekDates(w);
  const tt=ST.testType;
  const subj=ws[w]||'未定';
  const ps=SUBJ_PILL[subj]||SUBJ_PILL['未定'];

  // For each day, get per-slot info
  const dayInfos=dates.map((_,di)=>({
    morning:slotInfo(tt,w,di,'morning'),
    lunch:  slotInfo(tt,w,di,'lunch'),
  }));

  // Determine which sub-cols to show for each day
  // If neither slot has exam → show 1 merged "無考試" cell (colspan=2? or just 2 empty)
  // We always render 2 sub-cols per day for consistent layout

  // Row 1: day group header (colspan=2)
  const dayGroupHeaders=dates.map((d,di)=>{
    const hasMorning=dayInfos[di].morning.hasExam;
    const hasLunch=dayInfos[di].lunch.hasExam;
    const hasAny=hasMorning||hasLunch;
    return `<th class="th-day-group" colspan="2">
      <div class="th-date">${fmt(d)}</div>
      <div class="th-dow">${d?'（'+WDAYS[di]+'）':''}</div>
      ${!hasAny?'<div style="font-size:8px;color:#C4C4C4;margin-top:2px">無考試</div>':''}
    </th>`;
  }).join('');

  // Row 2: sub-column headers (早 / 午) per day
  const subHeaders=dates.map((_,di)=>{
    const mi=dayInfos[di].morning;
    const li=dayInfos[di].lunch;
    const mSlots=slotCount(mi.people);
    const lSlots=slotCount(li.people);
    const mSubjTag=mi.hasExam?`<span class="subj-${mi.subj} subj-inline">${mi.grade}年${mi.subj}</span>`:'';
    const lSubjTag=li.hasExam?`<span class="subj-${li.subj} subj-inline">${li.grade}年${li.subj}</span>`:'';
    return `
      <th class="th-sub ${mi.hasExam?'th-sub-morning':'th-sub-none'}">
        早自修${mSubjTag}
        ${mi.hasExam?`<div style="font-size:7px;font-family:'JetBrains Mono',monospace;color:#888;margin-top:1px">${mi.people}人→各${mSlots}位</div>`:''}
      </th>
      <th class="th-sub ${li.hasExam?'th-sub-lunch':'th-sub-none'}">
        午休${lSubjTag}
        ${li.hasExam?`<div style="font-size:7px;font-family:'JetBrains Mono',monospace;color:#888;margin-top:1px">${li.people}人→各${lSlots}位</div>`:''}
      </th>`;
  }).join('');

  // Role rows: for each role × slot index, render 2 sub-cols per day
  let roleRows='';
  for(const role of ROLES){
    for(let si=0;si<MAX_SLOTS_PER_ROLE;si++){
      roleRows+=`<tr><td class="rl rl-${role.color}">${role.label}<br><span style="font-size:8px;font-family:'JetBrains Mono',monospace;opacity:.5">#${si+1}</span></td>`;
      for(let d=0;d<DAYS;d++){
        for(const slot of SLOTS){
          const info=slotInfo(tt,w,d,slot);
          const slots=slotCount(info.people);
          const active=info.hasExam&&si<slots;
          const key=`${w}-${d}-${slot}-${role.key}-${si}`;
          const sid=sc[key];
          const stu=sid?ST.roster.find(s=>s.id===sid):null;
          const slotColorSuffix=slot==='morning'?'morning':'lunch';
          if(!active){
            roleRows+=`<td class="dc dc-inactive"><div style="height:44px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#D1D5DB">—</div></td>`;
          }else{
            roleRows+=`<td class="dc dc-${slotColorSuffix}-${role.color}" data-key="${key}"
              ondragover="ev_over(event)"
              ondrop="ev_drop(event,'${key}')"
              ondragenter="this.classList.add('over')"
              ondragleave="this.classList.remove('over')">
              ${stu
                ?`<div class="placed placed-${role.color}" data-id="${stu.id}" draggable="true"
                    ondragstart="onDragStart(event,'${stu.id}','placed')"
                    ondragend="this.classList.remove('dragging')">
                    <span class="p-rm" onclick="removeCard('${key}')">✕</span>
                    <div class="placed-num" style="color:${classColor(stu.num)}">${stu.num}</div>
                    <div class="placed-name">${stu.name}</div>
                  </div>`
                :'<div class="drop-empty">拖放</div>'}
            </td>`;
          }
        }
      }
      roleRows+='</tr>';
    }
  }

  return `<div class="week-block">
    <div class="week-head">
      <div class="week-label">第${WNUM[w]}週</div>
      <div class="week-subj-pill" style="${ps}">${subj==='未定'?'未定':'考'+subj}</div>
    </div>
    <table class="sch">
      <colgroup>
        <col style="width:52px">
        ${Array(DAYS*2).fill('<col style="min-width:72px">').join('')}
      </colgroup>
      <thead>
        <tr><th class="th-corner" rowspan="2">職位</th>${dayGroupHeaders}</tr>
        <tr>${subHeaders}</tr>
      </thead>
      <tbody>${roleRows}</tbody>
    </table>
  </div>`;
}

function renderSchedule(){
  const area=document.getElementById('scheduleArea');if(!area)return;
  const sc=ST.sched[ST.testType];
  const ws=examData.weekSubjs||{'篩選':['未定','未定','未定','未定'],'成長':['未定','未定','未定','未定']};
  const wsT=ws[ST.testType]||['未定','未定','未定','未定'];
  const tt=ST.testType;
  const today=new Date();
  const dateStr=`${today.getFullYear()}/${today.getMonth()+1}/${today.getDate()}`;

  const mkPageHeader=(weeks)=>`<div class="print-page-header">
    <div><div class="pph-title">學生<span>排班</span>表</div><div class="pph-sub">列印日期：${dateStr}</div></div>
    <div class="pph-type">${tt}測驗・${weeks}</div>
  </div>`;

  area.innerHTML=
    mkPageHeader('第一週～第二週')+
    weekTableHTML(0,sc,wsT)+
    weekTableHTML(1,sc,wsT)+
    mkPageHeader('第三週～第四週')+
    weekTableHTML(2,sc,wsT)+
    weekTableHTML(3,sc,wsT);
}

window.onDragStart=(ev,id,src)=>{
  if(!isEditMode){ev.preventDefault();return;}
  drag={id,src};ev.dataTransfer.effectAllowed='move';
  setTimeout(()=>{const el=document.querySelector(`[data-id="${id}"]`);if(el)el.classList.add('dragging');},0);

window.ev_over=ev=>{ev.preventDefault();ev.dataTransfer.dropEffect='move';};
window.ev_drop=(ev,targetKey)=>{
  ev.preventDefault();ev.currentTarget.classList.remove('over');
  if(!drag||!isEditMode)return;
  const sc=ST.sched[ST.testType];const existing=sc[targetKey];
  if(drag.src==='pool'){
    // Copy from pool — student can appear in multiple slots
    sc[targetKey]=drag.id;
  }else{
    // Move within placed cells — swap with existing
    const srcKey=Object.keys(sc).find(k=>sc[k]===drag.id&&k!==targetKey);
    if(srcKey){sc[srcKey]=existing||null;}
    sc[targetKey]=drag.id;
  }
  drag=null;saveST();renderPool();renderSchedule();
};

// ─── Notice ───────────────────────────────────────────────
const SLOT_TIME={'morning':'早自修 07:50~08:35','lunch':'午休 12:40~13:20'};
const ROLE_LABEL={'guide':'引導人員','reg':'報到人員','id':'發身分證條'};
const ROLE_CLASS={'guide':'nc-role-guide','reg':'nc-role-reg','id':'nc-role-id'};

function buildNoticeData(){
  const tt=ST.testType;
  const sc=ST.sched[tt];
  // Collect all assignments: {studentId -> [{w,d,slot,role,si,date,slotLabel,subjLabel,roleLabel}]}
  const map={};
  for(const [key,sid] of Object.entries(sc)){
    if(!sid)continue;
    const parts=key.split('-'); // w-d-slot-role-si
    const w=parseInt(parts[0]),d=parseInt(parts[1]),slot=parts[2],role=parts[3],si=parseInt(parts[4]);
    const info=slotInfo(tt,w,d,slot);
    if(!info.hasExam)continue;
    const dates=weekDates(w);
    const date=dates[d];
    if(!date)continue;
    if(!map[sid])map[sid]=[];
    map[sid].push({w,d,slot,role,si,date,info});
  }
  // Sort each student's assignments by date then slot
  for(const sid of Object.keys(map)){
    map[sid].sort((a,b)=>{
      const dt=a.date-b.date;
      if(dt!==0)return dt;
      return SLOTS.indexOf(a.slot)-SLOTS.indexOf(b.slot);
    });
  }
  return map;
}

function noticeCardHTML(stu, assignments){

    const dow=['日','一','二','三','四','五','六'][a.date.getDay()];
    const dateStr=`${a.date.getMonth()+1}/${a.date.getDate()}（${dow}）`;
    const timeStr=SLOT_TIME[a.slot];
    const subjStr=`${a.info.grade}年級${a.info.subj}`;
    const roleStr=`${ROLE_LABEL[a.role]} #${a.si+1}`;
    return `<tr>
      <td class="nc-seq">${idx+1}</td>
      <td class="nc-date">${dateStr}</td>
      <td class="nc-time">${timeStr}</td>
      <td class="nc-subj">${subjStr}</td>
      <td class="${ROLE_CLASS[a.role]}">${roleStr}</td>
    </tr>`;
  }).join('');

  return `<div class="notice-card">
    <div class="nc-school">聖約翰科技大學附屬中小學</div>
    <div class="nc-title">學生支援通知單</div>
    <hr class="nc-divider">
    <div class="nc-student-row">
      <div><div class="nc-label">班級座號</div><div class="nc-num">${stu.num}</div></div>
      <div><div class="nc-label">姓名</div><div class="nc-name">${stu.name}</div></div>
      <div style="margin-left:auto;text-align:right">
        <div class="nc-label">測驗類型</div>
        <div style="font-size:11pt;font-weight:700;color:#D97706">${ST.testType}測驗</div>
      </div>
    </div>
    <div class="nc-note">
      以下為您的考試支援場次，請準時至指定地點報到。如有疑問請洽主辦老師。<br>
      ⚠️ 請妥善保管此通知單，並於支援前再次確認時間與職位。
    </div>
    <table class="nc-table">
      <thead><tr>
        <th class="nc-seq">#</th>
        <th>日期</th>
        <th>時間</th>
        <th>考試科目</th>
        <th>支援職位</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="nc-sign">
      <div class="nc-sign-item"><div class="nc-sign-line"></div>學生簽名</div>
      <div class="nc-sign-item"><div class="nc-sign-line"></div>家長簽名</div>
      <div class="nc-sign-item"><div class="nc-sign-line"></div>教師確認</div>
    </div>
    <div class="nc-footer">列印日期：${new Date().getFullYear()}/${new Date().getMonth()+1}/${new Date().getDate()}</div>
  </div>`;
}

window.openNotice=()=>{
  const map=buildNoticeData();
  const sids=Object.keys(map);
  if(!sids.length){alert('目前尚無任何排班資料，請先排班再產生通知單。');return;}
  const pages=document.getElementById('noticePages');
  pages.innerHTML=sids.map(sid=>{
    const stu=ST.roster.find(s=>s.id===sid);
    if(!stu)return'';
    return noticeCardHTML(stu,map[sid]);
  }).join('');
  document.getElementById('noticeOverlay').classList.add('open');
};
window.closeNotice=()=>{
  document.getElementById('noticeOverlay').classList.remove('open');
};
window.doPrint=()=>{
  document.body.classList.remove('printing-notice');
  window.print();
};
// Override print btn for notice
document.addEventListener('DOMContentLoaded',()=>{});
// Patch: notice print button calls this
window.printNotice=()=>{
  document.body.classList.add('printing-notice');
  window.print();
  setTimeout(()=>document.body.classList.remove('printing-notice'),1000);
};

loadST();
</script>
<div class="notice-overlay" id="noticeOverlay">
  <div class="notice-toolbar">
    <div class="notice-toolbar-title">🖨 學生支援通知單預覽</div>
    <button class="notice-print-btn" onclick="printNotice()">🖨 列印 / 儲存 PDF</button>
    <button class="notice-close-btn" onclick="closeNotice()">✕ 關閉</button>
  </div>
  <div class="notice-pages" id="noticePages"></div>
</div>
</body>
</html>
