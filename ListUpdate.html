<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>學生名單比對更新工具</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --accent: #5b8af5;
    --accent2: #7ee8a2;
    --warn: #f5a623;
    --danger: #f56b6b;
    --text: #e8eaf6;
    --text2: #8b90b0;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 32px 24px;
  }

  .header {
    max-width: 1100px;
    margin: 0 auto 32px;
  }

  h1 {
    font-size: 1.7rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    margin-bottom: 6px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle { color: var(--text2); font-size: 0.87rem; line-height: 1.6; }

  .container { max-width: 1100px; margin: 0 auto; }

  /* ── Upload ── */
  .upload-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }

  @media (max-width: 640px) { .upload-grid { grid-template-columns: 1fr; } }

  .upload-card {
    background: var(--surface);
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 24px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    display: block;
    user-select: none;
  }

  .upload-card:hover { border-color: var(--accent); background: var(--surface2); }
  .upload-card.loaded { border-color: var(--accent2); border-style: solid; }

  .upload-icon { font-size: 2.2rem; margin-bottom: 10px; }
  .upload-label { font-size: 0.95rem; font-weight: 600; margin-bottom: 5px; }
  .upload-hint { font-size: 0.75rem; color: var(--text2); line-height: 1.5; }
  .upload-status { font-size: 0.78rem; color: var(--accent2); margin-top: 8px; font-weight: 500; min-height: 1.2em; }

  input[type="file"] { display: none; }

  /* ── Buttons ── */
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 22px;
    border: none; border-radius: var(--radius);
    font-family: inherit; font-size: 0.9rem; font-weight: 600;
    cursor: pointer; transition: all 0.18s;
    white-space: nowrap;
  }

  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover:not(:disabled) { background: #4a7aef; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(91,138,245,0.35); }
  .btn-primary:disabled { opacity: 0.38; cursor: not-allowed; }

  .btn-success { background: var(--accent2); color: #0f1117; }
  .btn-success:hover:not(:disabled) { background: #6ddea0; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(126,232,162,0.3); }
  .btn-success:disabled { opacity: 0.38; cursor: not-allowed; }

  .actions { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }

  /* ── Stats ── */
  .stats { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }

  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 18px;
    min-width: 110px;
  }

  .stat-num {
    font-size: 1.7rem; font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    line-height: 1;
  }

  .stat-label { font-size: 0.73rem; color: var(--text2); margin-top: 4px; }
  .stat.matched .stat-num { color: var(--accent2); }
  .stat.unmatched .stat-num { color: var(--danger); }
  .stat.changed-stat .stat-num { color: var(--warn); }
  .stat.total .stat-num { color: var(--accent); }

  /* ── Filter ── */
  .filter-bar {
    display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; align-items: center;
  }

  .filter-bar select, .filter-bar input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 8px 12px;
    font-family: inherit;
    font-size: 0.82rem;
    outline: none;
    transition: border-color 0.15s;
  }

  .filter-bar select:focus, .filter-bar input:focus { border-color: var(--accent); }
  .filter-bar input { min-width: 200px; }

  /* ── Table ── */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: auto;
    max-height: 480px;
  }

  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }

  thead { position: sticky; top: 0; z-index: 2; }

  th {
    background: var(--surface2);
    padding: 10px 13px;
    text-align: left;
    font-weight: 600;
    color: var(--text2);
    border-bottom: 2px solid var(--border);
    white-space: nowrap;
    font-size: 0.75rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  td {
    padding: 9px 13px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(91,138,245,0.06); }

  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.72rem;
    font-weight: 600;
    font-family: 'JetBrains Mono', monospace;
  }

  .tag-match { background: rgba(126,232,162,0.15); color: var(--accent2); }
  .tag-nomatch { background: rgba(245,107,107,0.15); color: var(--danger); }
  .tag-changed { background: rgba(245,166,35,0.15); color: var(--warn); }

  .changed-cell {
    color: var(--warn);
    font-weight: 600;
  }

  .arrow { color: var(--text2); font-size: 0.7rem; margin: 0 3px; }
  .new-val { color: var(--accent2); font-weight: 700; }

  /* ── Messages ── */
  .msg {
    padding: 11px 16px;
    border-radius: var(--radius);
    font-size: 0.83rem;
    margin-bottom: 14px;
    line-height: 1.5;
  }

  .msg-info { background: rgba(91,138,245,0.12); border: 1px solid rgba(91,138,245,0.3); color: #8fb3ff; }
  .msg-warn { background: rgba(245,166,35,0.12); border: 1px solid rgba(245,166,35,0.3); color: var(--warn); }
  .msg-success { background: rgba(126,232,162,0.12); border: 1px solid rgba(126,232,162,0.3); color: var(--accent2); }

  /* ── Placeholder ── */
  .placeholder { text-align: center; padding: 60px 20px; color: var(--text2); }
  .placeholder-icon { font-size: 3rem; margin-bottom: 14px; opacity: 0.4; }
  .placeholder p { font-size: 0.88rem; line-height: 1.6; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text2); }

  .row-num { color: var(--text2); font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; }
  .mono { font-family: 'JetBrains Mono', monospace; font-size: 0.78rem; }

  .footer {
    max-width: 1100px;
    margin: 24px auto 0;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    color: var(--text2);
    font-size: 0.74rem;
    text-align: center;
  }
</style>
</head>
<body>

<div class="header">
  <h1>📋 學生名單比對更新工具</h1>
  <p class="subtitle">
    上傳「待更新名單（Excel 1）」與「全校正確名單（Excel 2）」，<br>
    系統依身分證號自動比對，更新年級、班級、座號，再匯出 Excel 上傳回系統。
  </p>
</div>

<div class="container">

  <!-- Upload -->
  <div class="upload-grid">
    <label class="upload-card" id="card1" for="file1">
      <div class="upload-icon">📄</div>
      <div class="upload-label">Excel 1 — 待更新名單</div>
      <div class="upload-hint">
        欄位：學生姓名、身分證統一編號、<br>入學年度、目前班級、座號…
      </div>
      <div class="upload-status" id="status1">點擊選擇 .xlsx / .xls 檔案</div>
      <input type="file" id="file1" accept=".xlsx,.xls,.csv">
    </label>

    <label class="upload-card" id="card2" for="file2">
      <div class="upload-icon">📊</div>
      <div class="upload-label">Excel 2 — 全校正確名單</div>
      <div class="upload-hint">
        欄位：年級、班級、學生姓名、<br>座號、性別、身分證號、出生年月日…
      </div>
      <div class="upload-status" id="status2">點擊選擇 .xlsx / .xls 檔案</div>
      <input type="file" id="file2" accept=".xlsx,.xls,.csv">
    </label>
  </div>

  <!-- Actions -->
  <div class="actions">
    <div style="display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:8px 14px;">
      <label style="font-size:0.83rem;color:var(--text2);white-space:nowrap;">📅 當前學年度</label>
      <input type="number" id="currentYear" value="114" min="100" max="200"
        style="width:70px;background:transparent;border:none;border-bottom:1px solid var(--accent);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:1rem;font-weight:600;text-align:center;outline:none;padding:2px 4px;">
      <span style="font-size:0.78rem;color:var(--text2);">學年度（用於年級↔入學年度換算）</span>
    </div>
    <button class="btn btn-primary" id="btnMatch" disabled onclick="doMatch()">🔍 開始比對</button>
    <button class="btn btn-success" id="btnExport" disabled onclick="doExport()">⬇️ 匯出更新後 Excel</button>
  </div>

  <!-- Messages -->
  <div id="msgArea"></div>

  <!-- Stats -->
  <div class="stats" id="statsArea" style="display:none">
    <div class="stat total">
      <div class="stat-num" id="stTotal">0</div>
      <div class="stat-label">總筆數</div>
    </div>
    <div class="stat matched">
      <div class="stat-num" id="stMatched">0</div>
      <div class="stat-label">比對成功</div>
    </div>
    <div class="stat unmatched">
      <div class="stat-num" id="stUnmatched">0</div>
      <div class="stat-label">未找到對應</div>
    </div>
    <div class="stat changed-stat">
      <div class="stat-num" id="stChanged">0</div>
      <div class="stat-label">資料有更動</div>
    </div>
  </div>

  <!-- Filter -->
  <div class="filter-bar" id="filterBar" style="display:none">
    <select id="filterStatus" onchange="renderTable()">
      <option value="all">全部顯示</option>
      <option value="matched">✅ 已比對成功</option>
      <option value="unmatched">❌ 未找到對應</option>
      <option value="changed">🔔 資料有更動</option>
    </select>
    <input type="text" id="searchInput" placeholder="🔎 搜尋姓名 / 身分證號…" oninput="renderTable()">
  </div>

  <!-- Table -->
  <div class="table-wrap" id="tableWrap">
    <div class="placeholder">
      <div class="placeholder-icon">📂</div>
      <p>請先上傳兩份 Excel 檔案<br>再點擊「開始比對」</p>
    </div>
  </div>

</div>

<div class="footer">
  學生名單比對更新工具 · 資料僅在本機瀏覽器處理，不會上傳至任何伺服器
</div>

<script>
/* ── State ── */
let data1 = [], data2 = [], resultRows = [];

/* ── Column name candidates ── */
const ID_COLS_1  = ['身分證統一編號','身份證統一編號','身分證號','身份證號','身分證'];
const ID_COLS_2  = ['身分證號','身分證統一編號','身份證號','身份證統一編號','身分證'];
const NAME_COLS  = ['學生姓名','姓名','名稱'];
const GRADE_COLS = ['年級'];
const CLS_COLS_2 = ['班級'];
const SEAT_COLS_2= ['座號'];
const CLSNAME_COLS=['班級名稱'];
const YEAR_COLS  = ['入學年度','學年度'];
const CLS_COLS_1 = ['目前班級','班級'];
const SEAT_COLS_1= ['座號(選填)','座號'];

function detectCol(row, candidates) {
  for (const c of candidates) if (c in row) return c;
  return null;
}

/* ── File parsing ── */
function parseFile(file, cb) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, { type: 'binary' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const json = XLSX.utils.sheet_to_json(ws, { defval: '' });
      cb(json, null);
    } catch(err) {
      cb(null, err.message);
    }
  };
  reader.onerror = () => cb(null, '讀取失敗');
  reader.readAsBinaryString(file);
}

/* ── Upload handlers ── */
document.getElementById('file1').addEventListener('change', e => {
  const f = e.target.files[0]; if (!f) return;
  document.getElementById('status1').textContent = '讀取中…';
  parseFile(f, (rows, err) => {
    if (err) { showMsg('Excel 1 讀取失敗：' + err, 'warn'); return; }
    data1 = rows;
    document.getElementById('status1').textContent = `✅ ${f.name}（${rows.length} 筆）`;
    document.getElementById('card1').classList.add('loaded');
    checkReady();
  });
});

document.getElementById('file2').addEventListener('change', e => {
  const f = e.target.files[0]; if (!f) return;
  document.getElementById('status2').textContent = '讀取中…';
  parseFile(f, (rows, err) => {
    if (err) { showMsg('Excel 2 讀取失敗：' + err, 'warn'); return; }
    data2 = rows;
    document.getElementById('status2').textContent = `✅ ${f.name}（${rows.length} 筆）`;
    document.getElementById('card2').classList.add('loaded');
    checkReady();
  });
});

function checkReady() {
  document.getElementById('btnMatch').disabled = !(data1.length && data2.length);
}

/* ── Messages ── */
function showMsg(text, type = 'info') {
  document.getElementById('msgArea').innerHTML = `<div class="msg msg-${type}">${text}</div>`;
}

/* ── Match logic ── */
function doMatch() {
  if (!data1.length || !data2.length) return;
  document.getElementById('msgArea').innerHTML = '';

  const currentYear = parseInt(document.getElementById('currentYear').value, 10) || 114;
  // Excel2 年級1 → 入學年度 = currentYear, 年級2 → currentYear-1, ...
  // grade → enrollYear: enrollYear = currentYear - grade + 1
  // enrollYear → grade: grade = currentYear - enrollYear + 1

  const sample1 = data1[0], sample2 = data2[0];

  const idCol1    = detectCol(sample1, ID_COLS_1);
  const idCol2    = detectCol(sample2, ID_COLS_2);
  const nameCol1  = detectCol(sample1, NAME_COLS);
  const gradeCol2 = detectCol(sample2, GRADE_COLS);
  const clsCol2   = detectCol(sample2, CLS_COLS_2);   // Excel2 班級：01, 02...
  const seatCol2  = detectCol(sample2, SEAT_COLS_2);
  const yearCol1  = detectCol(sample1, YEAR_COLS);     // Excel1 入學年度：114,113...
  const clsCol1   = detectCol(sample1, CLS_COLS_1);   // Excel1 目前班級：101,102...
  const seatCol1  = detectCol(sample1, SEAT_COLS_1);

  if (!idCol1) { showMsg('⚠️ Excel 1 找不到身分證欄位。偵測到欄位：' + Object.keys(sample1).join('、'), 'warn'); return; }
  if (!idCol2) { showMsg('⚠️ Excel 2 找不到身分證欄位。偵測到欄位：' + Object.keys(sample2).join('、'), 'warn'); return; }

  /* Build lookup from Excel2 */
  const map2 = {};
  for (const r of data2) {
    const id = String(r[idCol2] || '').trim().toUpperCase();
    if (id) map2[id] = r;
  }

  resultRows = data1.map((r, idx) => {
    const id  = String(r[idCol1] || '').trim().toUpperCase();
    const ref = id ? map2[id] : null;
    const out = { ...r };

    out.__rowIdx  = idx + 2;
    out.__idKey   = id;
    out.__matched = false;
    out.__changed = false;
    out.__changes = {};

    if (ref) {
      out.__matched = true;

      // Excel2 的年級（1~6）
      const grade2    = parseInt(ref[gradeCol2] || '0', 10);
      // Excel2 的班級（01, 02...）→ 取數字
      const cls2Num   = parseInt(ref[clsCol2]   || '0', 10);
      const newSeat   = ref[seatCol2] != null ? String(ref[seatCol2]).trim() : '';

      // 由年級換算 → 入學年度（Excel1 格式）
      const correctEnrollYear = currentYear - grade2 + 1;  // e.g. 114-1+1=114, 114-2+1=113

      // 目前班級 = 年級 + 班級補零2位，e.g. 年級1 + 班01 = 101
      const correctClsName = String(grade2) + String(cls2Num).padStart(2, '0');  // "101","102"

      out.__newGrade    = grade2;
      out.__newCls      = cls2Num;
      out.__newSeat     = newSeat;
      out.__newEnroll   = correctEnrollYear;
      out.__newClsName  = correctClsName;

      /* ── 比對並更新「入學年度」 ── */
      if (yearCol1) {
        const oldYear = parseInt(String(out[yearCol1] || '').trim(), 10);
        if (!isNaN(oldYear) && oldYear !== correctEnrollYear) {
          out.__changes[yearCol1] = { from: String(oldYear), to: String(correctEnrollYear) };
          out[yearCol1] = correctEnrollYear;
          out.__changed = true;
        }
      }

      /* ── 比對並更新「目前班級」 ──
         Excel1「目前班級」存的是「班級號碼」（1, 2, 3...），
         對應 Excel2 的「班級」欄（1, 2, 3...），數值相同不更動。 */
      if (clsCol1) {
        const oldCls = parseInt(String(out[clsCol1] || '').trim(), 10);
        if (!isNaN(oldCls) && oldCls !== cls2Num) {
          out.__changes[clsCol1] = { from: String(oldCls), to: String(cls2Num) };
          out[clsCol1] = cls2Num;
          out.__changed = true;
        }
      }

      /* ── 比對並更新「座號」 ──
         數值相同（01==1）不視為變動，保留原始補零格式 */
      if (seatCol1 && newSeat !== '') {
        const old        = String(out[seatCol1] || '').trim();
        const oldNum     = parseInt(old, 10);
        const newSeatNum = parseInt(newSeat, 10);
        if (!isNaN(oldNum) && !isNaN(newSeatNum) && oldNum === newSeatNum) {
          // 數值相同，不動（保留 01 格式）
        } else if (old !== newSeat) {
          const origLen = old.length;
          const newVal  = isNaN(newSeatNum)
            ? newSeat
            : String(newSeatNum).padStart(origLen >= 2 && old.startsWith('0') ? origLen : 0, '0');
          out.__changes[seatCol1] = { from: old, to: newVal };
          out[seatCol1] = newVal;
          out.__changed = true;
        }
      }

      out.__sortGrade = grade2;
      out.__sortCls   = cls2Num;
      out.__sortSeat  = parseInt(newSeat, 10) || 0;
    } else {
      out.__sortGrade = 9999;
      out.__sortCls   = 9999;
      out.__sortSeat  = 9999;
    }

    return out;
  });

  /* 依年級 → 班級 → 座號排序（僅影響畫面顯示，匯出順序不變） */
  resultRows.sort((a, b) =>
    a.__sortGrade - b.__sortGrade ||
    a.__sortCls   - b.__sortCls   ||
    a.__sortSeat  - b.__sortSeat
  );

  const matched   = resultRows.filter(r => r.__matched).length;
  const unmatched = resultRows.length - matched;
  const changed   = resultRows.filter(r => r.__changed).length;

  document.getElementById('stTotal').textContent    = resultRows.length;
  document.getElementById('stMatched').textContent  = matched;
  document.getElementById('stUnmatched').textContent= unmatched;
  document.getElementById('stChanged').textContent  = changed;
  document.getElementById('statsArea').style.display = 'flex';
  document.getElementById('filterBar').style.display = 'flex';
  document.getElementById('btnExport').disabled = false;

  const msgs = [];
  if (unmatched > 0) msgs.push(`⚠️ 有 <strong>${unmatched}</strong> 筆在全校名單中找不到對應身分證號，請人工確認。`);
  if (changed > 0)   msgs.push(`🔔 已自動更新 <strong>${changed}</strong> 筆資料（班級 / 座號）。`);
  if (msgs.length)   showMsg(msgs.join('<br>'), unmatched > 0 ? 'warn' : 'success');
  else               showMsg('✅ 比對完成，所有資料均已是最新，無需更動。', 'success');

  renderTable();
}

/* ── Render table ── */
function renderTable() {
  if (!resultRows.length) return;

  const filter = document.getElementById('filterStatus').value;
  const search = document.getElementById('searchInput').value.trim().toLowerCase();

  const sample1  = data1[0];
  const idCol1   = detectCol(sample1, ID_COLS_1);
  const nameCol1 = detectCol(sample1, NAME_COLS);
  const yearCol1 = detectCol(sample1, YEAR_COLS);
  const clsCol1  = detectCol(sample1, CLS_COLS_1);
  const seatCol1 = detectCol(sample1, SEAT_COLS_1);

  let rows = resultRows.filter(r => {
    if (filter === 'matched'   && !r.__matched) return false;
    if (filter === 'unmatched' &&  r.__matched) return false;
    if (filter === 'changed'   && !r.__changed) return false;
    if (search) {
      const name = String(r[nameCol1] || '').toLowerCase();
      const id   = String(r.__idKey  || '').toLowerCase();
      if (!name.includes(search) && !id.includes(search)) return false;
    }
    return true;
  });

  if (rows.length === 0) {
    document.getElementById('tableWrap').innerHTML =
      '<div class="placeholder"><div class="placeholder-icon">🔍</div><p>沒有符合條件的資料</p></div>';
    return;
  }

  const showYear = !!yearCol1;
  const showCls  = !!clsCol1;
  const showSeat = !!seatCol1;

  let html = `<table><thead><tr>
    <th>#</th>
    <th>學生姓名</th>
    <th>身分證號</th>
    ${showYear ? '<th>入學年度（更新後）</th>' : ''}
    ${showCls  ? '<th>目前班級（更新後）</th>' : ''}
    ${showSeat ? '<th>座號（更新後）</th>' : ''}
    <th>全校名單<br>年級</th>
    <th>全校名單<br>班級</th>
    <th>全校名單<br>座號</th>
    <th>狀態</th>
  </tr></thead><tbody>`;

  rows.forEach(r => {
    const name  = r[nameCol1] || '—';
    const idRaw = r.__idKey  || '—';

    /* 入學年度欄 */
    let yearCell = '—';
    if (showYear) {
      const ch = r.__changes?.[yearCol1];
      if (ch) {
        yearCell = `<span class="changed-cell">${ch.from || '（空）'}</span><span class="arrow">→</span><span class="new-val">${ch.to}</span>`;
      } else {
        yearCell = String(r[yearCol1] ?? '—');
      }
    }

    /* 目前班級欄 */
    let clsCell = '—';
    if (showCls) {
      const ch = r.__changes?.[clsCol1];
      if (ch) {
        clsCell = `<span class="changed-cell">${ch.from || '（空）'}</span><span class="arrow">→</span><span class="new-val">${ch.to}</span>`;
      } else {
        clsCell = String(r[clsCol1] ?? '—');
      }
    }

    /* 座號欄 */
    let seatCell = '—';
    if (showSeat) {
      const ch = r.__changes?.[seatCol1];
      if (ch) {
        seatCell = `<span class="changed-cell">${ch.from || '（空）'}</span><span class="arrow">→</span><span class="new-val">${ch.to}</span>`;
      } else {
        seatCell = String(r[seatCol1] ?? '—');
      }
    }

    /* Status tag */
    let tag;
    if (!r.__matched) {
      tag = `<span class="tag tag-nomatch">❌ 未找到</span>`;
    } else if (r.__changed) {
      tag = `<span class="tag tag-changed">🔔 已更新</span>`;
    } else {
      tag = `<span class="tag tag-match">✅ 無變動</span>`;
    }

    html += `<tr>
      <td class="row-num">${r.__rowIdx}</td>
      <td>${name}</td>
      <td class="mono">${idRaw}</td>
      ${showYear ? `<td>${yearCell}</td>` : ''}
      ${showCls  ? `<td>${clsCell}</td>` : ''}
      ${showSeat ? `<td>${seatCell}</td>` : ''}
      <td>${r.__matched ? (r.__newGrade   || '—') : '—'}</td>
      <td>${r.__matched ? (r.__newCls     || '—') : '—'}</td>
      <td>${r.__matched ? (r.__newSeat    || '—') : '—'}</td>
      <td>${tag}</td>
    </tr>`;
  });

  html += '</tbody></table>';
  document.getElementById('tableWrap').innerHTML = html;
}

/* ── Export ── */
function doExport() {
  if (!resultRows.length) return;

  // 匯出維持原始 Excel1 的列順序（依 __rowIdx）
  const sorted = [...resultRows].sort((a, b) => a.__rowIdx - b.__rowIdx);

  const exportRows = sorted.map(r => {
    const out = {};
    for (const k of Object.keys(r)) {
      if (!k.startsWith('__')) out[k] = r[k];
    }
    return out;
  });

  const ws = XLSX.utils.json_to_sheet(exportRows);

  /* Auto column width */
  const cols = Object.keys(exportRows[0] || {});
  ws['!cols'] = cols.map(c => ({ wch: Math.max(c.length * 1.8, 10) }));

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '更新後名單');

  const dateStr = new Date().toISOString().slice(0, 10).replace(/-/g, '');
  XLSX.writeFile(wb, `學生名單_更新後_${dateStr}.xlsx`);
}
</script>
