<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sjps 學習輔助系統門戶</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Noto Sans TC', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--text-main);
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        header h1 {
            font-size: 2.5rem;
            letter-spacing: 2px;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            width: 100%;
            max-width: 1200px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 2.5rem 1.5rem;
            text-align: center;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            background: #ffffff;
        }

        .card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--primary-color);
            opacity: 0;
            transition: var(--transition);
        }

        .card:hover::before {
            opacity: 1;
        }

        .icon-box {
            width: 80px;
            height: 80px;
            background: #eff6ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            color: var(--primary-color);
            font-size: 2rem;
            transition: var(--transition);
        }

        .card:hover .icon-box {
            background: var(--primary-color);
            color: white;
            transform: rotateY(360deg);
        }

        .card h2 {
            font-size: 1.5rem;
            margin-bottom: 0.75rem;
            font-weight: 700;
        }

        .card p {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.6;
        }

        footer {
            margin-top: 4rem;
            color: var(--text-muted);
            font-size: 0.875rem;
            text-align: center;
        }

        /* 針對行動裝置微調 */
        @media (max-width: 640px) {
            header h1 { font-size: 1.8rem; }
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Sjps-Learning Assistance</h1>
        <p>學習輔助系統管理門戶 (Portal)</p>
    </header>

    <main class="container">
        <a href="ClassSystem.html" class="card">
            <div class="icon-box">
                <i class="fas fa-users-rectangle"></i>
            </div>
            <h2>班級系統</h2>
            <p>Class System (CS)<br>管理班級資料與成員結構，核心架構存取介面。</p>
        </a>

        <a href="ExamList.html" class="card">
            <div class="icon-box">
                <i class="fas fa-clipboard-list"></i>
            </div>
            <h2>考試清單</h2>
            <p>Examination List (EL)<br>檢視與整理所有考試科目及細項資料。</p>
        </a>

        <a href="ExamSchedule.html" class="card">
            <div class="icon-box">
                <i class="fas fa-calendar-check"></i>
            </div>
            <h2>考試時程</h2>
            <p>Examination Schedule (ES)<br>追蹤考試日期與時間安排，確保學習進度同步。</p>
        </a>

        <a href="PrintNotice.html" class="card">
            <div class="icon-box">
                <i class="fas fa-print"></i>
            </div>
            <h2>列印須知</h2>
            <p>Print Notice (PN)<br>格式化輸出規範與文件列印注意事項說明。</p>
        </a>
    </main>

    <footer>
        &copy; 2026 Sjps Learning Assistance. All rights reserved.
    </footer>

</body>
</html>
